<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership Inquiry - TrackingSA</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TGD3WRNKPZ"></script>

<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="inquiry-form-section">
            <h1>Partnership Inquiry</h1>
            <p>Interested in partnering with TrackingSA? Fill out the form below to get in touch!</p>
            <form action="https://formspree.io/f/xrellpvn" method="POST" class="inquiry-form">
                <div class="form-field">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-field">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="_replyto" placeholder="your@example.com" required>
                </div>
                <div class="form-field full-width">
                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="_subject" placeholder="Inquiry Subject" required>
                </div>
                <div class="form-field full-width">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="8" placeholder="Your message here..." required></textarea>
                </div>
                <button type="submit">Send Inquiry</button>
            </form>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 TrackingSA. 모든 권리 보유.</p>
    </footer>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- crypto-js for password hashing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <!-- Firebase-config -->
    <script src="firebase-config.js"></script>
    
    <script src="common.js"></script>
</body>
</html>
