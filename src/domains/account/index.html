<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="account_title">내 정보 | Tracking SA</title>
  <meta name="description" content="Tracking SA 내 정보 페이지입니다. 이메일과 계정 정보를 확인하고 탈퇴할 수 있습니다.">
  <style>
    .account-wrap {
      width: min(720px, 92vw);
      margin: 40px auto 90px;
    }
    .account-card {
      background: white;
      border: 1px solid oklch(92% 0.02 260);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 18px 36px rgba(2, 6, 23, 0.08);
      display: grid;
      gap: 24px;
    }
    .account-card h1 {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--text-main);
    }
    .account-card p {
      margin: 0;
      color: var(--text-sub);
      font-size: 0.95rem;
    }
    .account-info {
      display: grid;
      gap: 12px;
    }
    .account-section {
      display: grid;
      gap: 14px;
      padding-top: 10px;
      border-top: 1px solid oklch(94% 0.02 260);
    }
    .account-section h2 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text-main);
    }
    .account-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid oklch(94% 0.02 260);
    }
    .account-row:last-child {
      border-bottom: none;
    }
    .account-label {
      font-weight: 700;
      color: var(--text-main);
    }
    .account-value {
      color: var(--text-sub);
      word-break: break-all;
    }
    .account-actions {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .account-form {
      display: grid;
      gap: 12px;
    }
    .account-form label {
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
      display: block;
    }
    .account-form input {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      border: 1px solid oklch(88% 0.02 260);
      padding: 0 12px;
      font-size: 0.95rem;
      background: white;
    }
    .account-form input:focus {
      outline: none;
      border-color: var(--p-blue);
      box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.18);
    }
    .account-form .helper {
      font-size: 0.85rem;
      color: var(--text-sub);
    }
    .nickname-row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 8px;
    }
    .account-guest {
      display: grid;
      gap: 12px;
    }
    .auth-button {
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid oklch(90% 0.01 260);
      background: white;
      color: var(--text-main);
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .auth-button.primary {
      background: var(--p-blue);
      border-color: var(--p-blue);
      color: white;
    }
    .auth-button.danger {
      background: #ffe8e8;
      color: #c62828;
      border: 1px solid #f2b8b8;
    }
    .auth-button.danger:hover {
      background: #ffd6d6;
    }
    .account-actions .auth-button,
    .account-guest .auth-button {
      width: 100%;
    }
    body.dark-mode .account-card {
      background: oklch(20% 0.02 260);
      border-color: oklch(30% 0.02 260);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.4);
    }
    body.dark-mode .account-row {
      border-bottom-color: oklch(30% 0.02 260);
    }
    body.dark-mode .account-section {
      border-top-color: oklch(30% 0.02 260);
    }
    body.dark-mode .account-form input {
      background: #0f172a;
      border-color: oklch(35% 0.02 260);
      color: var(--text-main);
    }
    body.dark-mode .auth-button {
      background: #0f172a;
      border-color: oklch(35% 0.02 260);
      color: var(--text-main);
    }
    body.dark-mode .auth-button.primary {
      background: var(--p-blue);
      border-color: var(--p-blue);
      color: white;
    }
    body.dark-mode .auth-button.danger {
      background: #3b1d1d;
      border-color: #5b2b2b;
      color: #ffb4b4;
    }
  </style>
</head>
<body>
  <main class="account-wrap">
    <section class="account-card" id="account-card">
      <div>
        <h1 data-i18n="account_title">내 정보</h1>
        <p data-i18n="account_desc">계정 정보를 확인하고 관리할 수 있습니다.</p>
      </div>

      <div class="account-info" id="account-info"></div>

      <div class="account-actions" id="account-actions"></div>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
