<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="board_title">게시판 - TrackingSA</title>
    <meta name="description" content="TrackingSA의 게시판입니다. 다양한 주제에 대해 이야기하고 정보를 공유하세요.">
</head>
<body>
    <main>
        <section class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 40px; margin-top: 40px;">
                <h1 data-i18n="board_h1" style="font-size: 2.5rem; font-weight: 950; color: var(--text-main);">Board</h1>
                <a href="/board/write" style="background: var(--p-blue); color: white; padding: 15px 30px; border-radius: 12px; font-weight: 800; text-decoration: none; transition: 0.3s;" data-i18n="write_post">글쓰기</a>
            </div>
            
            <board-list id="board-list"></board-list>
        </section>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- crypto-js for password hashing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <!-- Firebase-config -->
    <script src="/firebase-config.js"></script>

    <script src="/translations.js"></script>
    <script src="/common.js"></script>
    <script type="module" src="./ui/board-list.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
