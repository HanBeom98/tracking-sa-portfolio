<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Sudden Attack Statistics - TrackingSA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="ui/style.css">
  
  <!-- Firebase SDK (v8) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="/firebase-config.js"></script>

  <script type="text/javascript" src="https://openapi.nexon.com/js/analytics.js?app_id=256854" async></script>
</head>
<body class="dark-theme">
  <main class="sa-container">
    <section class="search-section">
      <h1>서든어택 전적 검색</h1>
      <div class="search-bar">
        <input type="text" id="characterName" placeholder="캐릭터명을 입력하세요" />
        <button id="searchBtn">검색</button>
      </div>
      <div id="recentSearches" class="recent-searches">
        <!-- Search chips will be here -->
      </div>
      <div class="crew-actions">
        <button id="applyCrewBtn" class="sub-btn">⚔️ 내전 크루 신청</button>
        <button id="adminMenuBtn" class="sub-btn admin-only hidden">⚙️ 크루 관리</button>
      </div>
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p id="loadingText">데이터를 불러오는 중...</p>
      </div>
    </section>

    <!-- Crew Application Modal -->
    <div id="crewModal" class="modal hidden">
      <div class="modal-content">
        <h3>내전 크루 가입 신청</h3>
        <p>우리 크루로 등록되면 매치 기록에서 자동으로 내전이 감지됩니다.</p>
        <input type="text" id="applyCharacterName" placeholder="정확한 캐릭터명을 입력하세요" />
        <div class="modal-btns">
          <button id="submitApplyBtn" class="primary">신청하기</button>
          <button id="closeModalBtn">닫기</button>
        </div>
      </div>
    </div>

    <!-- Admin Panel (Inline) -->
    <section id="adminPanel" class="admin-section hidden">
      <h2>크루 신청 관리</h2>
      <div id="applicationList" class="app-list">
        <!-- Pending applications will be injected here -->
      </div>
      <button id="closeAdminBtn" class="close-panel">닫기</button>
    </section>

    <section id="playerProfile" class="profile-section hidden">
      <!-- sa-player-card will be injected here -->
    </section>

    <section id="statsSummary" class="stats-section hidden">
      <!-- sa-stats-summary will be injected here -->
    </section>

    <section id="matchHistory" class="history-section hidden">
      <h2>최근 매치 기록</h2>
      <!-- sa-match-list will be injected here -->
    </section>
  </main>

  <script type="module" src="main.js?v=20260228_7"></script>
</body>
</html>
