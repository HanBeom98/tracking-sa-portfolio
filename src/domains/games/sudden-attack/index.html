<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Sudden Attack Statistics - TrackingSA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="ui/style.css">
  
  <!-- Firebase SDKs are loaded via global layout/main system -->
  <script type="text/javascript" src="https://openapi.nexon.com/js/analytics.js?app_id=256854" async></script>
</head>
<body class="dark-mode">
  <main class="sa-container">
    <section class="search-section">
      <h1>서든어택 전적 검색</h1>
      <div class="search-bar">
        <input type="text" id="characterName" placeholder="캐릭터명을 입력하세요" />
        <div class="search-btns">
          <button id="searchBtn">검색</button>
          <button id="refreshBtn" class="refresh-btn hidden" title="최신 데이터로 갱신">🔄</button>
          <button id="compareBtn" class="compare-btn hidden" title="상대방과 전적 비교">⚔️ VS</button>
        </div>
      </div>
      <div id="recentSearches" class="recent-searches">
        <!-- Search chips will be here -->
      </div>
      <div class="crew-actions">
        <button id="applyCrewBtn" class="sub-btn">⚔️ 내전 크루 신청</button>
        <button id="adminMenuBtn" class="sub-btn admin-only hidden">⚙️ 크루 관리</button>
        <button id="balancerBtn" class="sub-btn staff-only hidden">⚖️ 팀 밸런서</button>
      </div>

      <!-- Team Balancer Modal -->
      <div id="balancerModal" class="modal hidden">
        <div class="modal-content balancer-modal">
          <h3>⚖️ AI 스마트 팀 밸런서</h3>
          <p>오늘 내전에 참여할 멤버들을 선택하세요 (짝수 인원 권장)</p>
          <div id="balancerMemberList" class="balancer-member-grid">
            <!-- Crew members with checkboxes will be here -->
          </div>
          <div id="balancerResult" class="balancer-result hidden">
            <div class="team-split">
              <div class="team red">
                <h4>TEAM RED</h4>
                <ul id="redTeamList"></ul>
                <span class="avg" id="redAvgMMR"></span>
              </div>
              <div class="vs-circle">VS</div>
              <div class="team blue">
                <h4>TEAM BLUE</h4>
                <ul id="blueTeamList"></ul>
                <span class="avg" id="blueAvgMMR"></span>
              </div>
            </div>
            <p class="balance-info" id="balanceDiff"></p>
          </div>
          <div class="modal-btns">
            <button id="calculateBalanceBtn" class="primary">밸런스 맞추기</button>
            <button id="closeBalancerBtn">닫기</button>
          </div>
        </div>
      </div>

      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p id="loadingText">데이터를 불러오는 중...</p>
      </div>
    </section>

    <!-- VS Mode Modal -->
    <div id="vsModal" class="modal hidden">
      <div class="modal-content">
        <h3>⚔️ 상대방 전적 비교</h3>
        <p>현재 검색된 유저와 비교할 상대방의 캐릭터명을 입력하세요.</p>
        <input type="text" id="vsTargetName" placeholder="비교할 캐릭터명 입력" />
        <div class="modal-btns">
          <button id="startVsBtn" class="primary" style="background: #bc00ff; color: #fff;">비교 시작</button>
          <button id="closeVsModalBtn">닫기</button>
        </div>
      </div>
    </div>

    <!-- Crew Application Modal -->
    <div id="crewModal" class="modal hidden">
      <div class="modal-content">
        <h3>내전 크루 가입 신청</h3>
        <p>우리 크루로 등록되면 매치 기록에서 자동으로 내전이 감지됩니다.</p>
        <input type="text" id="applyCharacterName" placeholder="정확한 캐릭터명을 입력하세요" />
        <div class="modal-btns">
          <button id="submitApplyBtn" class="primary">신청하기</button>
          <button id="closeModalBtn">닫기</button>
        </div>
      </div>
    </div>

    <!-- Admin Panel (Inline) -->
    <section id="adminPanel" class="admin-section hidden">
      <h2>크루 신청 관리</h2>
      <div id="applicationList" class="app-list">
        <!-- Pending applications will be injected here -->
      </div>
      <button id="closeAdminBtn" class="close-panel">닫기</button>
    </section>

    <section id="playerProfile" class="profile-section hidden">
      <!-- sa-player-card will be injected here -->
    </section>

    <section id="statsSummary" class="stats-section hidden">
      <!-- sa-stats-summary will be injected here -->
    </section>

    <section id="crewRanking" class="ranking-section">
      <!-- sa-crew-ranking will be injected here -->
    </section>

    <section id="matchHistory" class="history-section hidden">
      <h2>최근 매치 기록</h2>
      <!-- sa-match-list will be injected here -->
    </section>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
