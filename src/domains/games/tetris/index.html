    <meta name="description" content="PC와 모바일에서 언제 어디서나 즐기는 무료 테트리스 게임! Tracking SA에서 고전 퍼즐의 재미를 느껴보세요.">
    <meta property="og:title" content="테트리스 - 가볍게 즐기는 클래식 퍼즐 게임 | Tracking SA">
    <meta property="og:description" content="기록을 경신해보세요! 모바일에 최적화된 테트리스 게임입니다.">

    <!-- [Revenue] AdSense -->
    <style>
        :root {
            --bg-dark: oklch(10% 0.02 250);
            --panel-bg: oklch(20% 0.03 250);
            --joystick-bg: oklch(30% 0.04 250);
            --text-color: oklch(90% 0.05 20);
        }

        body {
            font-family: sans-serif;
            color: var(--text-color);
            background-color: var(--bg-dark);
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scroll */
        }

        info-panel {
            display: block;
            background-color: var(--panel-bg);
            padding: 1em;
            text-align: center;
            margin-bottom: 1em;
        }

        game-board {
            display: block;
            width: 100%;
            height: 60dvh; /* Dynamic viewport height */
            background-color: #000;
            margin: 0 auto;
        }

        game-joystick {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--joystick-bg);
            padding: 1em;
            border-radius: 10px;
            text-align: center;
        }

        game-joystick > button {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 0.5em 1em;
            border-radius: 5px;
            margin: 0 0.5em;
        }

        /* Web Component Styling - Container Queries */
        tetris-game {
            display: block;
            container-type: size; /* Establish container context */
            width: 100%;
            height: 100dvh;
        }

        /* Responsive Canvas Size */
        tetris-game:has(> .game-layout) {
            /* Adjust based on container size */
        }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
