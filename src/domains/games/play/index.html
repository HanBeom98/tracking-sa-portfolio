<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="loading_game">게임 불러오는 중... | Tracking SA</title>
    <!-- HEAD_INJECTION -->
    <link rel="stylesheet" href="/style.css">
    <style>
        .play-container {
            display: flex;
            flex-direction: column;
            min-height: 80vh;
            background: var(--bg-main);
        }
        .game-viewport-container {
            background: #000;
            width: 100%;
            aspect-ratio: 16/9;
            max-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .game-viewport {
            width: 100%;
            height: 100%;
            border: none;
        }
        .play-control-bar {
            background: var(--bg-main);
            padding: 10px 20px;
            border-bottom: 1px solid var(--p-blue-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-link {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--text-sub);
            font-size: 0.85rem;
            font-weight: 700;
        }
        .back-link:hover { color: var(--p-blue); }

        .game-bottom-bar {
            background: var(--bg-main);
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--p-blue-soft);
        }
        .game-info-mini h2 { margin: 0; font-size: 1.4rem; font-weight: 950; color: var(--text-main); }
        .game-info-mini p { margin: 4px 0 0 0; font-size: 0.95rem; color: var(--text-sub); font-weight: 600; }
        
        .play-stats {
            font-size: 0.85rem;
            color: var(--p-blue);
            font-weight: 800;
            background: var(--p-blue-soft);
            padding: 5px 15px;
            border-radius: 20px;
        }

        #related-section {
            background: var(--bg-sub);
            padding: 60px 20px;
        }
        
        @media (max-width: 600px) {
            .game-viewport-container { aspect-ratio: 1/1; max-height: 70vh; }
            .game-bottom-bar { flex-direction: column; gap: 20px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <!-- HEADER_INJECTION -->
    
    <div class="play-container">
        <!-- Minimal Control Bar below main site nav -->
        <div class="play-control-bar">
            <a href="/games/" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                <span data-i18n="back_to_hub">게임 센터로 돌아가기</span>
            </a>
            <div id="loading-indicator" style="color: var(--p-blue); font-size: 0.75rem; font-weight: 800;">
                Connecting...
            </div>
        </div>

        <div class="game-viewport-container">
            <iframe id="game-frame" class="game-viewport" allow="autoplay; fullscreen" title="Game Player"></iframe>
        </div>

        <div class="game-bottom-bar" id="game-player-bottom">
            <div class="game-info-mini">
                <h2 id="display-title">---</h2>
                <p id="display-author">By ---</p>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="play-stats" id="display-plays">
                    --- plays
                </div>
                <button id="share-btn" style="background:white; border:1px solid var(--p-blue-soft); padding:10px 20px; border-radius:12px; cursor:pointer; font-size:0.9rem; font-weight:700; display:flex; align-items:center; gap:8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                    <span data-i18n="share_game">공유</span>
                </button>
            </div>
        </div>

        <!-- Related Games Section -->
        <div id="related-section">
            <div style="max-width: 1100px; margin: 0 auto;">
                <h3 style="margin: 0 0 35px 0; font-size: 1.25rem; font-weight: 900; color: var(--text-main); display: flex; align-items: center; gap: 12px;">
                    <span style="width:4px; height:22px; background:var(--p-blue); border-radius:2px;"></span>
                    <span data-i18n="related_games">추천 게임</span>
                </h3>
                <div id="related-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px;">
                    <!-- Recommended games here -->
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER_INJECTION -->
    <script type="module" src="main.js"></script>
</body>
</html>
