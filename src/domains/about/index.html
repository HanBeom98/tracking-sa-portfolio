<!DOCTYPE html>
<html lang="ko">
<head>

    <title data-i18n="about_us">서비스 소개 - Tracking SA</title>
</head>
<body>
    <app-layout 
      data-i18n-attr="page-title:about_us"
      page-title="서비스 소개">
        <div style="font-size: 1.1rem; line-height: 1.8; display: flex; flex-direction: column; gap: 20px; max-width: 800px; margin: 0 auto;">
            <p data-i18n="about_us_intro1">TrackingSA는 단순한 정보 전달을 넘어 기술과 자본의 흐름을 분석하는 전문 인베스터 인사이트 플랫폼입니다. 우리는 독자들에게 깊이 있는 통찰과 실제적인 비즈니스 가치를 제공하는 것을 목표로 합니다.</p>
            <p data-i18n="about_us_intro2">고도로 훈련된 분석 엔진을 통해 글로벌 테크 트렌드를 큐레이션하고, 독창적인 관점에서 수익화 아이디어를 제시합니다. 변화하는 기술 세계에서 여러분의 가장 든든한 가이드가 되겠습니다.</p>
            <p data-i18n="about_us_thanks" style="font-weight: 800; color: #0052cc; text-align: center; font-size: 1.2rem;">방문해 주셔서 감사합니다!</p>
        </div>
    </app-layout>

    <script src="/ui/app-layout.js" type="module"></script>
