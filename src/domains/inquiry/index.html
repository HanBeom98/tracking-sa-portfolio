<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="partnership_inquiry">파트너십 문의 - Tracking SA</title>
</head>
<body>
    <app-layout 
      data-i18n-attr="page-title:partnership_inquiry_title;page-description:partnership_inquiry_description"
      page-title="Partnership Inquiry" 
      page-description="TrackingSA와 파트너십에 관심 있으신가요? 아래 양식을 작성하여 문의해 주세요!">
        
        <form class="inquiry-form" style="display: flex; flex-direction: column; gap: 25px; max-width: 800px; margin: 0 auto;">
            <div style="display: flex; flex-direction: column; gap: 10px; text-align: left;">
                <label data-i18n="name" style="font-weight: 800;">이름</label>
                <input type="text" style="padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; width: 100%;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px; text-align: left;">
                <label data-i18n="email" style="font-weight: 800;">이메일</label>
                <input type="email" style="padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; width: 100%;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px; text-align: left;">
                <label data-i18n="message" style="font-weight: 800;">메시지</label>
                <textarea rows="5" style="padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; resize: none; width: 100%;"></textarea>
            </div>
            <button type="submit" style="background: #0052cc; color: white; padding: 20px; border-radius: 15px; border: none; font-weight: 900; font-size: 1.2rem; cursor: pointer; transition: 0.3s;" data-i18n="send_inquiry">문의 보내기</button>
        </form>
    </app-layout>

    <script src="/ui/app-layout.js" type="module"></script>
</body>
</html>
