<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코스피200 선물 모니터 | Tracking SA</title>
  <meta name="description" content="TradingView 위젯으로 코스피200 선물(KRX:K2I1!)을 모니터링합니다.">
  <meta property="og:title" content="코스피200 선물 모니터 | Tracking SA">
  <meta property="og:description" content="TradingView 위젯 기반 코스피200 선물 모니터 페이지">
  <meta property="og:image" content="/logo.svg">
  <meta property="og:url" content="https://trackingsa.com/futures-estimate/">
  <link rel="stylesheet" href="/style.css">
  <style>
    :root {
      --futures-main-height: 980px;
      --futures-ta-height: 620px;
    }

    .futures-page {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    .futures-hero {
      background: linear-gradient(145deg, #ffffff, #f3f9ff);
      border: 1px solid #dbeafe;
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }

    .futures-hero h1 {
      margin: 0 0 6px;
      color: #0f172a;
      font-size: clamp(1.15rem, 2.2vw, 1.5rem);
      font-weight: 800;
    }

    .futures-hero p {
      margin: 0;
      color: #334155;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .futures-panel {
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      padding: 12px;
    }

    .panel-title {
      margin: 2px 2px 10px;
      color: #0f172a;
      font-size: 1rem;
      font-weight: 800;
    }

    .panel-subtitle {
      margin: 0 2px 12px;
      color: #64748b;
      font-size: 0.85rem;
    }

    .tv-wrap {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .tv-wrap + .panel-title {
      margin-top: 16px;
    }

    #tv-main-widget {
      min-height: var(--futures-main-height);
    }

    #tv-ta-widget {
      min-height: var(--futures-ta-height);
    }

    @media (max-width: 860px) {
      :root {
        --futures-main-height: 700px;
        --futures-ta-height: 460px;
      }
    }
  </style>
</head>
<body>
  <main class="futures-page">
    <section class="futures-hero">
      <h1>코스피200 선물 모니터</h1>
      <p>소스 일관성을 위해 TradingView 위젯만 사용합니다. 위젯 크기는 CSS 변수 `--futures-main-height`, `--futures-ta-height`로 조절할 수 있습니다.</p>
    </section>

    <section class="futures-panel">
      <div class="panel-title">KRX:K2I1! 메인 차트</div>
      <div class="panel-subtitle">지연 시세 기준 (TradingView)</div>
      <div id="tv-main-widget" class="tv-wrap"></div>

      <div class="panel-title">KRX:K2I1! 기술적 분석</div>
      <div class="panel-subtitle">오실레이터/이동평균 시그널</div>
      <div id="tv-ta-widget" class="tv-wrap"></div>
    </section>
  </main>

  <script>
    function buildWidget(containerId, scriptSrc, payload) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '<div class="tradingview-widget-container__widget"></div>';
      const script = document.createElement("script");
      script.type = "text/javascript";
      script.async = true;
      script.src = scriptSrc;
      script.text = JSON.stringify(payload);
      container.appendChild(script);
    }

    function initWidgets() {
      const htmlLang = (document.documentElement.lang || "ko").toLowerCase();
      const locale = htmlLang.startsWith("en") ? "en" : "kr";

      buildWidget(
        "tv-main-widget",
        "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js",
        {
          autosize: false,
          width: "100%",
          height: 980,
          symbol: "KRX:K2I1!",
          interval: "5",
          timezone: "Asia/Seoul",
          theme: "light",
          style: "1",
          locale: locale,
          load_last_chart: false,
          withdateranges: true,
          hide_side_toolbar: false,
          allow_symbol_change: false,
          details: true,
          hotlist: false,
          studies: ["Volume@tv-basicstudies"],
        }
      );

      buildWidget(
        "tv-ta-widget",
        "https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js",
        {
          interval: "5m",
          width: "100%",
          isTransparent: true,
          height: 620,
          symbol: "KRX:K2I1!",
          showIntervalTabs: true,
          displayMode: "single",
          locale: locale,
          colorTheme: "light",
        }
      );
    }

    document.addEventListener("DOMContentLoaded", initWidgets);
  </script>
</body>
</html>
