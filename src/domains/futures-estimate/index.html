<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="futures_page_title">선물야간추정지수 | Tracking SA</title>
  <meta name="description" content="S&P500 선물 변동을 기반으로 코스피200 야간 추정 지수를 차트로 확인하세요.">
  <meta property="og:title" content="선물야간추정지수 | Tracking SA">
  <meta property="og:description" content="실시간에 가까운 선물 기반 코스피200 추정 지수 차트">
  <meta property="og:image" content="/logo.svg">
  <meta property="og:url" content="https://trackingsa.com/futures-estimate/">
  <link rel="stylesheet" href="/style.css">
  <style>
    .futures-page {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 18px 16px 48px;
    }

    .futures-hero {
      background: linear-gradient(160deg, #ffffff, #eff6ff);
      border: 1px solid #dbeafe;
      border-radius: 22px;
      padding: 20px 20px 16px;
      box-shadow: 0 18px 40px -28px rgba(30, 64, 175, 0.35);
      margin-bottom: 16px;
    }

    .futures-hero h1 {
      margin: 0 0 6px;
      font-size: clamp(1.2rem, 2.3vw, 1.6rem);
      color: #0f172a;
    }

    .futures-hero p {
      margin: 0;
      color: #334155;
      font-size: 0.95rem;
    }

    .futures-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .metric-card {
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 14px;
      padding: 10px 12px;
    }

    .metric-label {
      color: #475569;
      font-size: 0.76rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .metric-value {
      color: #0f172a;
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .metric-value.delta-up { color: #dc2626; }
    .metric-value.delta-down { color: #2563eb; }

    .futures-panel {
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 18px;
      padding: 12px;
    }

    #futures-chart {
      width: 100%;
      height: 420px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .futures-footnote {
      margin-top: 12px;
      color: #475569;
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .futures-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 10px;
    }

    #refresh-btn {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    #status-text {
      margin-top: 8px;
      min-height: 20px;
      color: #dc2626;
      font-size: 0.86rem;
    }

    @media (max-width: 860px) {
      .futures-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      #futures-chart { height: 340px; }
    }
  </style>
</head>
<body>
  <main class="futures-page">
    <section class="futures-hero">
      <h1 data-i18n="futures_page_title">선물야간추정지수</h1>
      <p data-i18n="futures_page_subtitle">S&P500 선물 변동을 기반으로 코스피200 추정 지수를 계산합니다.</p>
      <div class="futures-metrics">
        <div class="metric-card">
          <div class="metric-label" data-i18n="futures_live_label">실시간 추정값</div>
          <div class="metric-value" id="estimate-value">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label" data-i18n="futures_sp_label">S&P500 선물</div>
          <div class="metric-value" id="sp-value">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label" data-i18n="futures_kospi_label">코스피200 기준</div>
          <div class="metric-value" id="kospi-base-value">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label" data-i18n="futures_updated_at">업데이트</div>
          <div class="metric-value" id="updated-at" style="font-size:0.95rem;">-</div>
        </div>
      </div>
    </section>

    <section class="futures-panel">
      <div id="futures-chart"></div>
      <div id="status-text"></div>
      <div class="futures-actions">
        <button id="refresh-btn" data-i18n="futures_refresh">새로고침</button>
      </div>
      <div class="futures-footnote">
        <div data-i18n="futures_calc_note">계산식: 코스피200 기준값 × (1 + S&P500 선물 등락률)</div>
        <div data-i18n="futures_source_note">데이터: Yahoo Finance 실시간 시세(지연/중단 가능)</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    const STORAGE_KEY = "futures_estimate_history_v1";
    const MAX_POINTS = 800;
    let chart = null;
    let series = null;
    let points = [];

    function tr(key, fallback) {
      return window.getTranslation ? window.getTranslation(key, fallback) : fallback;
    }

    function setStatus(msg) {
      const el = document.getElementById("status-text");
      if (el) el.textContent = msg || "";
    }

    function formatNum(n) {
      if (typeof n !== "number" || !isFinite(n)) return "-";
      return n.toFixed(2);
    }

    function formatTime(unixTs) {
      if (!unixTs) return "-";
      const d = new Date(unixTs * 1000);
      return d.toLocaleString();
    }

    function loadLocalPoints() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr)) return [];
        return arr.filter(p => p && typeof p.time === "number" && typeof p.value === "number");
      } catch (_) {
        return [];
      }
    }

    function saveLocalPoints() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(points.slice(-MAX_POINTS)));
      } catch (_) {}
    }

    function ensureChart() {
      if (chart) return;
      const container = document.getElementById("futures-chart");
      chart = LightweightCharts.createChart(container, {
        layout: { background: { color: "#ffffff" }, textColor: "#1f2937" },
        grid: { vertLines: { color: "#f1f5f9" }, horzLines: { color: "#f1f5f9" } },
        rightPriceScale: { borderColor: "#e2e8f0" },
        timeScale: { borderColor: "#e2e8f0", timeVisible: true, secondsVisible: false }
      });
      series = chart.addLineSeries({ color: "#2563eb", lineWidth: 2 });
      window.addEventListener("resize", () => {
        chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
      });
      chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
    }

    function renderPoints() {
      ensureChart();
      series.setData(points.slice(-MAX_POINTS));
    }

    function addPoint(time, value) {
      const last = points[points.length - 1];
      if (last && last.time === time) {
        last.value = value;
      } else {
        points.push({ time, value });
      }
      points = points.slice(-MAX_POINTS);
      saveLocalPoints();
      renderPoints();
    }

    async function fetchQuote() {
      const url = "https://query1.finance.yahoo.com/v7/finance/quote?symbols=ES%3DF,%5EKS200";
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("quote fetch failed");
      const json = await res.json();
      const items = (json && json.quoteResponse && json.quoteResponse.result) || [];
      const es = items.find(x => x.symbol === "ES=F");
      const ks = items.find(x => x.symbol === "^KS200");
      if (!es || !ks) throw new Error("required symbols missing");

      const esPrice = Number(es.regularMarketPrice);
      const esPrev = Number(es.regularMarketPreviousClose || es.regularMarketPreviousClose || es.postMarketPreviousClose);
      const ksBase = Number(ks.regularMarketPrice || ks.regularMarketPreviousClose);
      const ts = Number(es.regularMarketTime || Math.floor(Date.now() / 1000));
      if (!isFinite(esPrice) || !isFinite(esPrev) || !isFinite(ksBase) || esPrev <= 0) {
        throw new Error("invalid quote values");
      }

      const esReturn = (esPrice - esPrev) / esPrev;
      const estimate = ksBase * (1 + esReturn);
      const delta = estimate - ksBase;
      const deltaRate = (delta / ksBase) * 100;
      return { ts, esPrice, esPrev, ksBase, estimate, delta, deltaRate };
    }

    function renderMetrics(q) {
      const estimateEl = document.getElementById("estimate-value");
      estimateEl.textContent = `${formatNum(q.estimate)} (${q.delta >= 0 ? "+" : ""}${formatNum(q.delta)}, ${q.deltaRate >= 0 ? "+" : ""}${q.deltaRate.toFixed(2)}%)`;
      estimateEl.classList.remove("delta-up", "delta-down");
      estimateEl.classList.add(q.delta >= 0 ? "delta-up" : "delta-down");

      document.getElementById("sp-value").textContent = `${formatNum(q.esPrice)} (${((q.esPrice - q.esPrev) / q.esPrev * 100).toFixed(2)}%)`;
      document.getElementById("kospi-base-value").textContent = formatNum(q.ksBase);
      document.getElementById("updated-at").textContent = formatTime(q.ts);
    }

    async function refreshQuote() {
      try {
        setStatus("");
        const q = await fetchQuote();
        renderMetrics(q);
        addPoint(q.ts, Number(q.estimate.toFixed(3)));
      } catch (e) {
        setStatus(tr("futures_load_fail", "시세를 불러오지 못했습니다. 잠시 후 다시 시도해주세요."));
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      points = loadLocalPoints();
      renderPoints();
      refreshQuote();
      setInterval(refreshQuote, 60000);
      document.getElementById("refresh-btn").addEventListener("click", refreshQuote);
    });
  </script>
</body>
</html>
