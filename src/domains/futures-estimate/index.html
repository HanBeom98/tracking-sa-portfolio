<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코스피200 지수 모니터 | Tracking SA</title>
  <meta name="description" content="TradingView 위젯 기반 코스피200 지수 모니터 페이지입니다. 야간선물은 TradingView 원페이지에서 확인할 수 있습니다.">
  <meta property="og:title" content="코스피200 지수 모니터 | Tracking SA">
  <meta property="og:description" content="코스피200 지수 위젯 + 야간선물 원페이지 링크">
  <meta property="og:image" content="/logo.svg">
  <meta property="og:url" content="https://trackingsa.com/futures-estimate/">
  <link rel="stylesheet" href="/style.css">
  <style>
    :root {
      --futures-main-height: 980px;
      --futures-ta-height: 620px;
    }

    .futures-page {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    .futures-hero {
      background: linear-gradient(145deg, #ffffff, #f3f9ff);
      border: 1px solid #dbeafe;
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }

    .futures-hero h1 {
      margin: 0 0 6px;
      color: #0f172a;
      font-size: clamp(1.15rem, 2.2vw, 1.5rem);
      font-weight: 800;
    }

    .futures-hero p {
      margin: 0;
      color: #334155;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .futures-panel {
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      padding: 12px;
    }

    .panel-title {
      margin: 2px 2px 10px;
      color: #0f172a;
      font-size: 1rem;
      font-weight: 800;
    }

    .panel-subtitle {
      margin: 0 2px 12px;
      color: #64748b;
      font-size: 0.85rem;
    }

    .tv-link {
      margin: 0 2px 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #0f172a;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .multi-grid {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .mini-card {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      padding: 8px;
    }

    .mini-title {
      margin: 2px 2px 8px;
      color: #0f172a;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .mini-widget {
      min-height: 280px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }

    @media (max-width: 860px) {
      :root {
        --futures-main-height: 700px;
        --futures-ta-height: 460px;
      }

      .multi-grid {
        grid-template-columns: 1fr;
      }

      .mini-widget {
        min-height: 240px;
      }
    }
  </style>
</head>
<body>
  <main class="futures-page">
    <section class="futures-hero">
      <h1>코스피200 지수 모니터</h1>
      <p>임베드 정책상 야간선물(K2I1!)은 TradingView 원페이지 링크로 제공하고, 페이지 내 위젯은 공개 임베드 가능한 코스피200 지수 심볼을 사용합니다.</p>
    </section>

    <section class="futures-panel">
      <a class="tv-link" href="https://kr.tradingview.com/symbols/KRX-K2I1!/?contract=K2IH2026" target="_blank" rel="noopener nofollow">야간선물 K2I1! 원페이지에서 보기</a>

      <div class="panel-title">야간 영향 4종 모니터</div>
      <div class="panel-subtitle">SPY, QQQ, DIA, USDKRW 동시 확인</div>
      <div class="multi-grid">
        <div class="mini-card">
          <div class="mini-title">AMEX:SPY (S&P500 ETF)</div>
          <div id="tv-es-widget" class="mini-widget"></div>
        </div>
        <div class="mini-card">
          <div class="mini-title">NASDAQ:QQQ (나스닥100 ETF)</div>
          <div id="tv-nq-widget" class="mini-widget"></div>
        </div>
        <div class="mini-card">
          <div class="mini-title">AMEX:DIA (다우 ETF)</div>
          <div id="tv-vix-widget" class="mini-widget"></div>
        </div>
        <div class="mini-card">
          <div class="mini-title">FX_IDC:USDKRW (달러/원)</div>
          <div id="tv-krw-widget" class="mini-widget"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    function buildWidget(containerId, scriptSrc, payload) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '<div class="tradingview-widget-container__widget"></div>';
      const script = document.createElement("script");
      script.type = "text/javascript";
      script.async = true;
      script.src = scriptSrc;
      script.text = JSON.stringify(payload);
      container.appendChild(script);
    }

    function initWidgets() {
      const htmlLang = (document.documentElement.lang || "ko").toLowerCase();
      const locale = htmlLang.startsWith("en") ? "en" : "kr";
      const miniSymbols = [
        { id: "tv-es-widget", symbol: "AMEX:SPY" },
        { id: "tv-nq-widget", symbol: "NASDAQ:QQQ" },
        { id: "tv-vix-widget", symbol: "AMEX:DIA" },
        { id: "tv-krw-widget", symbol: "FX_IDC:USDKRW" },
      ];

      miniSymbols.forEach(({ id, symbol }) => {
        buildWidget(
          id,
          "https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js",
          {
            symbol,
            width: "100%",
            height: 280,
            locale,
            dateRange: "1D",
            colorTheme: "light",
            isTransparent: false,
            largeChartUrl: "",
            chartOnly: false,
            noTimeScale: false,
          }
        );
      });
    }

    document.addEventListener("DOMContentLoaded", initWidgets);
  </script>
</body>
</html>
