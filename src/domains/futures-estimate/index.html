<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="futures_page_title">선물야간추정지수 | Tracking SA</title>
  <meta name="description" content="S&P500 선물 변동을 기반으로 코스피200 야간 추정 지수를 차트로 확인하세요.">
  <meta property="og:title" content="선물야간추정지수 | Tracking SA">
  <meta property="og:description" content="실시간에 가까운 선물 기반 코스피200 추정 지수 차트">
  <meta property="og:image" content="/logo.svg">
  <meta property="og:url" content="https://trackingsa.com/futures-estimate/">
  <link rel="stylesheet" href="/style.css">
  <style>
    .futures-page {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 18px 16px 48px;
    }

    .futures-hero {
      background: linear-gradient(160deg, #ffffff, #eff6ff);
      border: 1px solid #dbeafe;
      border-radius: 22px;
      padding: 20px 20px 16px;
      box-shadow: 0 18px 40px -28px rgba(30, 64, 175, 0.35);
      margin-bottom: 16px;
    }

    .futures-hero h1 {
      margin: 0 0 6px;
      font-size: clamp(1.2rem, 2.3vw, 1.6rem);
      color: #0f172a;
    }

    .futures-hero p {
      margin: 0;
      color: #334155;
      font-size: 0.95rem;
    }

    .futures-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .metric-card {
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 14px;
      padding: 10px 12px;
    }

    .metric-label {
      color: #475569;
      font-size: 0.76rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .metric-value {
      color: #0f172a;
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .metric-value.delta-up { color: #dc2626; }
    .metric-value.delta-down { color: #2563eb; }

    .futures-panel {
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 18px;
      padding: 12px;
    }

    .panel-title {
      margin: 4px 2px 10px;
      color: #0f172a;
      font-size: 1.02rem;
      font-weight: 800;
    }

    .panel-subtitle {
      margin: 0 2px 12px;
      color: #64748b;
      font-size: 0.86rem;
    }

    #tv-widget-container {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      min-height: 470px;
      margin-bottom: 16px;
      background: #fff;
    }

    #futures-chart {
      width: 100%;
      height: 420px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .futures-footnote {
      margin-top: 12px;
      color: #475569;
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .futures-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 10px;
    }

    #refresh-btn {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    #status-text {
      margin-top: 8px;
      min-height: 20px;
      color: #dc2626;
      font-size: 0.86rem;
    }

    @media (max-width: 860px) {
      .futures-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      #futures-chart { height: 340px; }
    }
  </style>
</head>
<body>
  <main class="futures-page">
    <section class="futures-hero">
      <h1 data-i18n="futures_page_title">선물야간추정지수</h1>
      <p data-i18n="futures_page_subtitle">S&P500 선물 변동을 기반으로 코스피200 추정 지수를 계산합니다.</p>
      <div class="futures-metrics">
        <div class="metric-card">
          <div class="metric-label" data-i18n="futures_live_label">실시간 추정값</div>
          <div class="metric-value" id="estimate-value">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label" data-i18n="futures_sp_label">S&P500 선물</div>
          <div class="metric-value" id="sp-value">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label" data-i18n="futures_kospi_label">코스피200 기준</div>
          <div class="metric-value" id="kospi-base-value">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label" data-i18n="futures_updated_at">업데이트</div>
          <div class="metric-value" id="updated-at" style="font-size:0.95rem;">-</div>
        </div>
      </div>
    </section>

    <section class="futures-panel">
      <div class="panel-title" data-i18n="futures_tv_title">TradingView 기술적 분석</div>
      <div class="panel-subtitle" data-i18n="futures_tv_subtitle">KRX:KOSPI200FUT 기준 시그널(오실레이터/이동평균)</div>
      <div id="tv-widget-container"></div>

      <div class="panel-title" data-i18n="futures_estimate_chart_title">Tracking SA 추정지수 차트</div>
      <div id="futures-chart"></div>
      <div id="status-text"></div>
      <div class="futures-actions">
        <button id="refresh-btn" data-i18n="futures_refresh">새로고침</button>
      </div>
      <div class="futures-footnote">
        <div data-i18n="futures_calc_note">계산식: 코스피200 기준값 × (1 + S&P500 선물 등락률)</div>
        <div data-i18n="futures_source_note">데이터: 공개 시세 기반 추정값 (지연/중단 가능)</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    const MAX_POINTS = 800;
    const CHART_WINDOW_SECONDS = 60 * 60 * 24;
    const VALUE_BAND_RATIO = 0.2;
    let chart = null;
    let series = null;
    let points = [];

    function tr(key, fallback) {
      return window.getTranslation ? window.getTranslation(key, fallback) : fallback;
    }

    function setStatus(msg) {
      const el = document.getElementById("status-text");
      if (el) el.textContent = msg || "";
    }

    function formatNum(n) {
      if (typeof n !== "number" || !isFinite(n)) return "-";
      return n.toFixed(2);
    }

    function formatTime(unixTs) {
      if (!unixTs) return "-";
      const d = new Date(unixTs * 1000);
      return d.toLocaleString();
    }

    function ensureChart() {
      if (chart) return;
      const container = document.getElementById("futures-chart");
      chart = LightweightCharts.createChart(container, {
        layout: { background: { color: "#ffffff" }, textColor: "#1f2937" },
        grid: { vertLines: { color: "#f1f5f9" }, horzLines: { color: "#f1f5f9" } },
        rightPriceScale: { borderColor: "#e2e8f0" },
        timeScale: { borderColor: "#e2e8f0", timeVisible: true, secondsVisible: false }
      });
      series = chart.addLineSeries({ color: "#2563eb", lineWidth: 2 });
      window.addEventListener("resize", () => {
        chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
      });
      chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
    }

    function renderPoints() {
      ensureChart();
      series.setData(points.slice(-MAX_POINTS));
      if (chart && chart.timeScale) {
        chart.timeScale().fitContent();
      }
    }

    function getDb() {
      return window.db || (typeof firebase !== "undefined" && firebase.apps.length ? firebase.firestore() : null);
    }

    function initTradingViewWidget() {
      const container = document.getElementById("tv-widget-container");
      if (!container) return;
      container.innerHTML = '<div class="tradingview-widget-container__widget"></div>';

      const htmlLang = (document.documentElement.lang || "ko").toLowerCase();
      const locale = htmlLang.startsWith("en") ? "en" : "kr";
      const script = document.createElement("script");
      script.type = "text/javascript";
      script.async = true;
      script.src = "https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js";
      script.text = JSON.stringify({
        interval: "5m",
        width: "100%",
        isTransparent: true,
        height: 470,
        symbol: "CME_MINI:ES1!",
        showIntervalTabs: true,
        displayMode: "single",
        locale: locale,
        colorTheme: "light"
      });
      container.appendChild(script);
    }

    async function loadChartPoints() {
      const db = getDb();
      if (!db) throw new Error("db unavailable");
      const snap = await db.collection("futures_estimate_points")
        .orderBy("ts", "desc")
        .limit(MAX_POINTS)
        .get();
      points = snap.docs
        .map((d) => d.data())
        .filter((d) => typeof d.ts === "number" && typeof d.estimate === "number")
        .sort((a, b) => a.ts - b.ts)
        .map((d) => ({ time: d.ts, value: d.estimate }));

      if (points.length > 1) {
        const latestTs = points[points.length - 1].time;
        const minTs = latestTs - CHART_WINDOW_SECONDS;
        points = points.filter((p) => p.time >= minTs);
      }

      // Drop legacy points from old base regimes (e.g. 350 -> 900 migration)
      // so the chart remains readable after baseline changes.
      if (points.length > 1) {
        const latestValue = points[points.length - 1].value;
        const minValue = latestValue * (1 - VALUE_BAND_RATIO);
        const maxValue = latestValue * (1 + VALUE_BAND_RATIO);
        points = points.filter((p) => p.value >= minValue && p.value <= maxValue);
      }

      renderPoints();
    }

    function renderMetrics(q) {
      const estimateEl = document.getElementById("estimate-value");
      estimateEl.textContent = `${formatNum(q.estimate)} (${q.delta >= 0 ? "+" : ""}${formatNum(q.delta)}, ${q.deltaRate >= 0 ? "+" : ""}${q.deltaRate.toFixed(2)}%)`;
      estimateEl.classList.remove("delta-up", "delta-down");
      estimateEl.classList.add(q.delta >= 0 ? "delta-up" : "delta-down");

      const spRate = q.futuresPrevClose > 0 ? ((q.futuresPrice - q.futuresPrevClose) / q.futuresPrevClose) * 100 : 0;
      document.getElementById("sp-value").textContent = `${formatNum(q.futuresPrice)} (${spRate.toFixed(2)}%)`;
      document.getElementById("kospi-base-value").textContent = formatNum(q.kospi200Base);
      const updatedTs = q.collectedAtTs || q.ts;
      document.getElementById("updated-at").textContent = formatTime(updatedTs);

      const ageSec = Math.max(0, Math.floor(Date.now() / 1000) - updatedTs);
      if (ageSec > 15 * 60) {
        setStatus(tr("futures_stale_warn", "데이터가 지연되고 있습니다. 잠시 후 다시 확인해주세요."));
      }
    }

    async function loadCurrent() {
      const db = getDb();
      if (!db) throw new Error("db unavailable");
      const doc = await db.collection("futures_estimate_meta").doc("current").get();
      if (!doc.exists) throw new Error("current doc missing");
      const d = doc.data() || {};
      let collectedAtTs = 0;
      if (d.collectedAt) {
        if (typeof d.collectedAt.seconds === "number") {
          collectedAtTs = d.collectedAt.seconds;
        } else if (typeof d.collectedAt.toDate === "function") {
          collectedAtTs = Math.floor(d.collectedAt.toDate().getTime() / 1000);
        }
      }
      const q = {
        ts: Number(d.ts || 0),
        collectedAtTs: Number(collectedAtTs || 0),
        estimate: Number(d.estimate || 0),
        delta: Number(d.delta || 0),
        deltaRate: Number(d.delta_rate || d.deltaRate || 0),
        futuresPrice: Number(d.futures_price || d.futuresPrice || 0),
        futuresPrevClose: Number(d.futures_prev_close || d.futuresPrevClose || 0),
        kospi200Base: Number(d.kospi200_base || d.kospi200Base || 0),
      };
      if (!isFinite(q.estimate) || q.estimate <= 0) {
        throw new Error("invalid current quote");
      }
      renderMetrics(q);
    }

    async function refreshAll() {
      try {
        setStatus("");
        await Promise.all([loadCurrent(), loadChartPoints()]);
      } catch (e) {
        setStatus(tr("futures_load_fail", "시세를 불러오지 못했습니다. 잠시 후 다시 시도해주세요."));
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      initTradingViewWidget();
      points = [];
      renderPoints();
      refreshAll();
      setInterval(refreshAll, 60000);
      document.getElementById("refresh-btn").addEventListener("click", refreshAll);
    });
  </script>
</body>
</html>
