<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 | Tracking SA</title>
  <meta name="description" content="Tracking SA 회원가입 페이지입니다. 이메일과 비밀번호로 계정을 생성할 수 있습니다.">
  <link rel="stylesheet" href="/style.css">
  <style>
    .signup-wrap {
      width: min(560px, 92vw);
      margin: 40px auto 80px;
    }
    .signup-card {
      background: white;
      border: 1px solid oklch(92% 0.02 260);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 18px 36px rgba(2, 6, 23, 0.08);
    }
    .signup-card h1 {
      margin: 0 0 8px;
      font-size: 1.7rem;
      font-weight: 900;
      color: var(--text-main);
    }
    .signup-card p {
      margin: 0 0 22px;
      color: var(--text-sub);
      font-size: 0.95rem;
    }
    .signup-form {
      display: grid;
      gap: 14px;
    }
    .signup-form label {
      font-weight: 700;
      margin-bottom: 6px;
      display: block;
      color: var(--text-main);
    }
    .signup-form input {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      border: 1px solid oklch(88% 0.02 260);
      padding: 0 16px;
      font-size: 1rem;
      background: white;
      transition: border 0.2s, box-shadow 0.2s;
    }
    .signup-form input:focus {
      outline: none;
      border-color: var(--p-blue);
      box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.18);
    }
    .signup-actions {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }
    .signup-actions button {
      height: 50px;
      border-radius: 14px;
      border: none;
      background: var(--p-blue);
      color: white;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 16px rgba(0, 82, 204, 0.25);
    }
    .signup-actions button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0, 82, 204, 0.3);
    }
    .signup-actions .secondary {
      background: white;
      color: var(--text-main);
      border: 1px solid oklch(90% 0.01 260);
      box-shadow: none;
    }
    .signup-helper {
      font-size: 0.85rem;
      color: var(--text-sub);
    }
    body.dark-mode .signup-card {
      background: oklch(20% 0.02 260);
      border-color: oklch(30% 0.02 260);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.4);
    }
    body.dark-mode .signup-form input {
      background: #0f172a;
      border-color: oklch(35% 0.02 260);
      color: var(--text-main);
    }
    body.dark-mode .signup-actions .secondary {
      background: #0f172a;
      border-color: oklch(35% 0.02 260);
      color: var(--text-main);
    }
  </style>
</head>
<body>
  <main class="signup-wrap">
    <section class="signup-card">
      <h1>회원가입</h1>
      <p>이메일과 비밀번호로 계정을 생성합니다.</p>
      <form id="signup-form" class="signup-form">
        <div>
          <label for="email">이메일</label>
          <input id="email" type="email" autocomplete="email" required>
        </div>
        <div>
          <label for="password">비밀번호</label>
          <input id="password" type="password" autocomplete="new-password" required>
        </div>
        <div class="signup-helper">비밀번호는 6자 이상이어야 합니다.</div>
        <div class="signup-actions">
          <button type="submit">회원가입</button>
          <button type="button" class="secondary" id="back-login">로그인으로 돌아가기</button>
        </div>
      </form>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
