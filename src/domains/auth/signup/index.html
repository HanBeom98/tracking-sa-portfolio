<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 | Tracking SA</title>
  <meta name="description" content="Tracking SA 회원가입 페이지입니다. 이메일과 비밀번호로 계정을 생성할 수 있습니다.">
  <link rel="stylesheet" href="/style.css">
  <style>
    .signup-page {
      width: min(540px, 92vw);
      margin: 40px auto 80px;
      background: white;
      border: 1px solid oklch(92% 0.02 260);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(2, 6, 23, 0.08);
    }
    .signup-page h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-main);
    }
    .signup-page p {
      margin: 0 0 20px;
      color: var(--text-sub);
      font-size: 0.95rem;
    }
    .signup-form {
      display: grid;
      gap: 12px;
    }
    .signup-form label {
      font-weight: 700;
      margin-bottom: 6px;
      display: block;
    }
    .signup-form input {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      border: 1px solid oklch(88% 0.02 260);
      padding: 0 14px;
      font-size: 1rem;
    }
    .signup-actions {
      display: grid;
      gap: 10px;
      margin-top: 6px;
    }
    .signup-actions button {
      height: 48px;
      border-radius: 12px;
      border: none;
      background: var(--p-blue);
      color: white;
      font-weight: 800;
      cursor: pointer;
    }
    .signup-actions .secondary {
      background: white;
      color: var(--text-main);
      border: 1px solid oklch(90% 0.01 260);
    }
    .signup-helper {
      font-size: 0.85rem;
      color: var(--text-sub);
    }
  </style>
</head>
<body>
  <main class="signup-page">
    <h1>회원가입</h1>
    <p>이메일과 비밀번호로 계정을 생성합니다.</p>
    <form id="signup-form" class="signup-form">
      <div>
        <label for="email">이메일</label>
        <input id="email" type="email" autocomplete="email" required>
      </div>
      <div>
        <label for="password">비밀번호</label>
        <input id="password" type="password" autocomplete="new-password" required>
      </div>
      <div class="signup-helper">비밀번호는 6자 이상이어야 합니다.</div>
      <div class="signup-actions">
        <button type="submit">회원가입</button>
        <button type="button" class="secondary" id="back-login">로그인으로 돌아가기</button>
      </div>
    </form>
  </main>
  <script src="main.js"></script>
</body>
</html>
