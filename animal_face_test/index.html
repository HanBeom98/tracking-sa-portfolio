    <!-- [3] 리소스 연동 (상대 경로 복구) -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <link rel="stylesheet" href="./style.css">

<body>
    <main>
        <section class="animal-face-test">
            <h1 data-i18n="animal_face_test_h1">당신은 어떤 동물을 닮았나요?</h1>
            <p data-i18n="animal_face_test_p1">당신은 어떤 동물을 닮았는지 알아보세요!</p>
            <div id="gender-selection" class="gender-selection-wrapper">
                <label data-i18n="select_gender">성별 선택:</label>
                <div class="gender-buttons">
                    <button id="gender-male" class="gender-button" data-gender="male" data-i18n="gender_male">남성</button>
                    <button id="gender-female" class="gender-button" data-gender="female" data-i18n="gender_female">여성</button>
                </div>
            </div>
            <div class="image-upload-section">
                <div class="upload-wrapper">
                    <div id="drop-zone" class="drop-zone">
                        <input type="file" id="image-upload" accept="image/*" style="display: none;">
                        <label for="image-upload" class="custom-file-upload" data-i18n="select_image">이미지 선택</label>
                    </div>
                    <div id="image-preview-container">
                        <img id="image-preview" src="" alt="이미지 미리보기">
                        <button type="button" id="predict-button" class="go-test-button" data-i18n="check_result">결과 확인</button>
                    </div>
                </div>
            </div>
            <div id="loading-indicator" class="loading-indicator" style="display:none;">
                <div class="spinner"></div>
                <p data-i18n="analyzing_image">분석 중...</p>
            </div>
            <div id="result-section" class="result-section" style="display:none;">
                <div id="result-emoji" class="result-large-emoji"></div>
                <div id="prediction-result" class="prediction-result"></div>
                <button type="button" id="retake-button" class="go-test-button" data-i18n="retake_test">다시 테스트</button>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../translations.js"></script>
    <script src="../common.js"></script>
    <script src="./main.js"></script>
</body>
</html>
