    <main>
        <section class="inquiry-form-section">
            <h1 data-i18n="partnership_inquiry_title">파트너십 문의</h1>
            <p data-i18n="partnership_inquiry_description">TrackingSA와 파트너십에 관심 있으신가요? 아래 양식을 작성하여 문의해 주세요!</p>
            <form action="https://formspree.io/f/xrellpvn" method="POST" class="inquiry-form">
                <div class="form-field">
                    <label for="name" data-i18n="name">이름:</label>
                    <input type="text" id="name" name="name" data-i18n-placeholder="your_name" placeholder="귀하의 이름" required>
                </div>
                <div class="form-field">
                    <label for="email" data-i18n="email">이메일:</label>
                    <input type="email" id="email" name="_replyto" data-i18n-placeholder="your_email" placeholder="Your Email" required>
                </div>
                <div class="form-field full-width">
                    <label for="subject" data-i18n="subject">제목:</label>
                    <input type="text" id="subject" name="_subject" data-i18n-placeholder="inquiry_subject" placeholder="문의 제목" required>
                </div>
                <div class="form-field full-width">
                    <label for="message" data-i18n="message">메시지:</label>
                    <textarea id="message" name="message" rows="8" data-i18n-placeholder="your_message_here" placeholder="메시지를 여기에 작성해주세요..." required></textarea>
                </div>
                <button type="submit" data-i18n="send_inquiry">문의 보내기</button>
            </form>
        </section>
