  <style>
    .account-wrap {
      width: min(720px, 92vw);
      margin: 40px auto 90px;
    }
    .account-card {
      background: white;
      border: 1px solid oklch(92% 0.02 260);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 18px 36px rgba(2, 6, 23, 0.08);
      display: grid;
      gap: 24px;
    }
    .account-card h1 {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--text-main);
    }
    .account-card p {
      margin: 0;
      color: var(--text-sub);
      font-size: 0.95rem;
    }
    .account-info {
      display: grid;
      gap: 12px;
    }
    .account-section {
      display: grid;
      gap: 14px;
      padding-top: 10px;
      border-top: 1px solid oklch(94% 0.02 260);
    }
    .account-section h2 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text-main);
    }
    .account-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid oklch(94% 0.02 260);
    }
    .account-row:last-child {
      border-bottom: none;
    }
    .account-label {
      font-weight: 700;
      color: var(--text-main);
    }
    .account-value {
      color: var(--text-sub);
      word-break: break-all;
    }
    .account-actions {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .account-actions button {
      height: 50px;
      border-radius: 14px;
      border: none;
      font-weight: 800;
      cursor: pointer;
    }
    .account-actions .primary {
      background: var(--p-blue);
      color: white;
      box-shadow: 0 6px 16px rgba(0, 82, 204, 0.25);
    }
    .account-actions .danger {
      background: #ffe8e8;
      color: #c62828;
      border: 1px solid #f2b8b8;
    }
    .account-form {
      display: grid;
      gap: 12px;
    }
    .account-form label {
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
      display: block;
    }
    .account-form input {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      border: 1px solid oklch(88% 0.02 260);
      padding: 0 12px;
      font-size: 0.95rem;
      background: white;
    }
    .account-form input:focus {
      outline: none;
      border-color: var(--p-blue);
      box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.18);
    }
    .account-form .helper {
      font-size: 0.85rem;
      color: var(--text-sub);
    }
    .nickname-row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 8px;
    }
    .nickname-row button {
      border: none;
      border-radius: 12px;
      background: #eef4ff;
      color: #2147d6;
      font-weight: 700;
      cursor: pointer;
    }
    .avatar-row {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 8px;
      align-items: center;
    }
    .avatar-row input[type="file"] {
      height: 46px;
      padding: 8px;
      border-radius: 12px;
      border: 1px dashed oklch(84% 0.02 260);
      background: #f8faff;
    }
    .avatar-row button {
      height: 46px;
      border-radius: 12px;
      border: none;
      background: var(--p-blue);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    .avatar-drop {
      border: 1px dashed oklch(82% 0.02 260);
      border-radius: 14px;
      padding: 14px;
      background: #f7f9ff;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-sub);
      transition: border 0.2s, background 0.2s;
      cursor: pointer;
    }
    .avatar-drop.dragover {
      border-color: var(--p-blue);
      background: #eef4ff;
      color: var(--text-main);
    }
    .profile-preview {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .profile-preview img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid oklch(90% 0.02 260);
    }
    .account-guest {
      display: grid;
      gap: 12px;
    }
    .account-guest button {
      height: 46px;
      border-radius: 12px;
      border: none;
      background: var(--p-blue);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    body.dark-mode .account-card {
      background: oklch(20% 0.02 260);
      border-color: oklch(30% 0.02 260);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.4);
    }
    body.dark-mode .account-row {
      border-bottom-color: oklch(30% 0.02 260);
    }
    body.dark-mode .account-section {
      border-top-color: oklch(30% 0.02 260);
    }
    body.dark-mode .account-actions .danger {
      background: #3b1d1d;
      border-color: #5b2b2b;
      color: #ffb4b4;
    }
    body.dark-mode .account-form input {
      background: #0f172a;
      border-color: oklch(35% 0.02 260);
      color: var(--text-main);
    }
  </style>
