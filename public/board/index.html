    <script type="module">
        async function updateUI() {
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get("category");
            const h1 = document.getElementById("board-title-h1");
            const writeLink = document.getElementById("board-write-link");
            
            const t = (key, fallback) => (window.getTranslation ? window.getTranslation(key, fallback) : fallback);
            
            if (category === "notice") {
                h1.textContent = t("notice", "공지사항");
                h1.setAttribute("data-i18n", "notice");
            } else {
                h1.textContent = t("free_board", "자유게시판");
                h1.setAttribute("data-i18n", "free_board");
            }
            
            // Update write link href
            writeLink.href = "/board/write" + (category ? "?category=" + category : "");
            
            // Check visibility
            // wait for auth state ready
            if (window.AuthGateway) {
                await window.AuthGateway.waitForReady();
            }
            const profile = window.getCurrentUserProfile ? window.getCurrentUserProfile() : null;
            
            if (category === "notice") {
                if (profile && profile.role === "admin") {
                    writeLink.style.display = "inline-block";
                } else {
                    writeLink.style.display = "none";
                }
            } else {
                writeLink.style.display = "inline-block";
            }
        }
        
        window.addEventListener('DOMContentLoaded', updateUI);
        window.addEventListener('auth-state-changed', updateUI);
    </script>
