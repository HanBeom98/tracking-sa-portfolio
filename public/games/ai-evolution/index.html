<style>
:root {
            --bg-dark: #0f172a;
            --board-bg: #1e293b;
            --cell-bg: #334155;
            --text-primary: #f8fafc;
            --neon-blue: #38bdf8;
            --neon-purple: #c084fc;
            --transition-ms: 150ms;
            --game-nav-height: 58px;
        }

        #game-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--game-nav-height);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(15, 23, 42, 0.92);
            border-bottom: 1px solid #1f2937;
            backdrop-filter: blur(10px);
            z-index: 60;
            box-sizing: border-box;
        }

        #game-nav a {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.88rem;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all .2s ease;
        }

        #game-nav a:hover,
        #game-nav a:focus {
            color: #e2e8f0;
            border-color: #334155;
            background: rgba(30, 41, 59, 0.85);
        }

        #ai-evolution-game {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            overflow: hidden;
            touch-action: none;
            position: fixed;
            inset: var(--game-nav-height) 0 0 0;
            z-index: 10;
        }

        #game-wrapper {
            width: 100%;
            max-width: 420px;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 5px;
        }

        .game-title-area h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            font-size: 0.9rem;
            color: var(--neon-purple);
            font-weight: bold;
            margin-top: -5px;
        }

        .score-container {
            display: flex;
            gap: 8px;
        }

        .score-box {
            background: var(--board-bg);
            min-width: 70px;
            padding: 6px 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--cell-bg);
        }

        .score-box .label {
            font-size: 0.6rem;
            color: var(--neon-blue);
            font-weight: bold;
        }

        .score-box div:last-child {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .main-controls {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--cell-bg);
            background: var(--board-bg);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #status-message {
            height: 24px;
            text-align: center;
            color: var(--neon-purple);
            font-weight: bold;
            font-size: 0.95rem;
            text-shadow: 0 0 8px rgba(192, 132, 252, 0.4);
            transition: opacity 0.5s ease;
        }

        #status-message.fade-out {
            opacity: 0;
        }

        #game-board-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--board-bg);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .grid-layer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background: var(--cell-bg);
            border-radius: 6px;
        }

        #tile-layer {
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
        }

        .tile {
            position: absolute;
            width: calc(25% - 9px);
            height: calc(25% - 9px);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px;
            transition: left var(--transition-ms) ease-in-out, top var(--transition-ms) ease-in-out, transform 100ms ease-out;
            z-index: 10;
        }

        .tile-inner {
            font-weight: 900;
            font-size: 1.1rem;
            text-align: center;
            word-break: break-word;
            line-height: 1;
        }

        /* Tile Evolution Colors */
        .tile-2 { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .tile-4 { background: #334155; color: #cbd5e1; border: 1px solid var(--neon-blue); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        .tile-8 { background: #0c4a6e; color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .tile-16 { background: #1e3a8a; color: var(--neon-blue); border: 1px solid var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); }
        .tile-32 { background: #4c1d95; color: var(--neon-purple); border: 1px solid var(--neon-purple); }
        .tile-64 { background: #581c87; color: var(--neon-purple); border: 1px solid var(--neon-purple); box-shadow: 0 0 15px rgba(192, 132, 252, 0.3); }
        .tile-128 { background: #701a75; color: #f472b6; border: 1px solid #f472b6; font-size: 0.7rem; }
        .tile-256 { background: #831843; color: #fb7185; border: 1px solid #fb7185; box-shadow: 0 0 20px rgba(251, 113, 133, 0.4); }
        .tile-512 { background: #991b1b; color: #fca5a5; border: 1px solid #ef4444; }
        .tile-1024 { background: #000; color: #fff; border: 2px solid var(--neon-blue); box-shadow: 0 0 25px var(--neon-blue); font-size: 0.65rem; }
        .tile-2048 { background: #000; color: gold; border: 2px solid var(--neon-purple); box-shadow: 0 0 35px var(--neon-purple); animation: surge 2s infinite; }

        @keyframes surge {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.03); filter: brightness(1.3); }
        }

        .tile-new { animation: appear 200ms ease-out; }
        .tile-merged { animation: pop 200ms ease-in-out; }

        @keyframes appear { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        /* Modals */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal.hidden { display: none; }

        .modal-content {
            background: var(--board-bg);
            width: 85%;
            max-width: 320px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
        }

        .result-info { margin: 15px 0; }
        .result-info p { margin: 5px 0; font-size: 1.1rem; }
        #final-stage-name { color: var(--neon-purple); font-weight: 800; }

        /* Ranking Styles */
        .ranking-section {
            margin: 15px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border: 1px solid var(--cell-bg);
        }
        .ranking-title {
            font-size: 0.9rem;
            color: var(--neon-blue);
            margin-bottom: 8px;
            font-weight: bold;
        }
        #rank-list {
            font-size: 0.85rem;
            color: #aaa;
            text-align: left;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nick-input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        #nick-input {
            flex: 1;
            padding: 10px;
            background: #111;
            border: 1px solid var(--cell-bg);
            border-radius: 5px;
            color: white;
            text-align: center;
            font-size: 0.9rem;
        }
        #submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (max-width: 768px) {
            :root {
                --game-nav-height: 54px;
            }
            #game-nav {
                gap: 6px;
                padding: 8px 10px;
            }
            #game-nav a {
                font-size: 0.78rem;
                padding: 5px 8px;
            }
            #ai-evolution-game {
                padding: 10px;
            }
            #game-wrapper {
                margin: 0 auto;
            }
        }

    </style>

    <script>
        // [1] Firebase 초기화
        if (typeof firebaseConfig === 'undefined') {
            window.firebaseConfig = {
                authDomain: "tracking-sa-295db.firebaseapp.com",
                projectId: "tracking-sa-295db",

            };
        }

        if (typeof firebase !== 'undefined' && firebase.apps.length === 0) {
            firebase.initializeApp(firebaseConfig);
        }

        if (typeof firebase !== 'undefined' && typeof db === 'undefined') {
            window.db = firebase.firestore();
        }

        class AIEvolution2048 {
            constructor() {
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('ai_evolution_best')) || 0;
                this.undoBuffer = null;
                this.maxTileReached = 2;
                this.isGameOver = false;
                this.isMoving = false;
                
                // Audio
                this.audioCtx = null;
                this.isMuted = false;
                this.bgmNodes = [];
                this.bgmTimeout = null;
                
                this.init();
            }

            init() {
                this.tileLayer = document.getElementById('tile-layer');
                this.scoreElem = document.getElementById('current-score');
                this.bestElem = document.getElementById('best-score');
                this.undoBtn = document.getElementById('undo-btn');
                this.statusMsg = document.getElementById('status-message');
                this.modal = document.getElementById('game-over-modal');
                this.rankList = document.getElementById('rank-list');
                this.nickInput = document.getElementById('nick-input');
                this.submitBtn = document.getElementById('submit-btn');
                
                // Add Mute Button
                const controls = document.querySelector('.main-controls');
                if (controls) {
                    const muteBtn = document.createElement('button');
                    muteBtn.id = 'mute-btn';
                    muteBtn.className = 'action-btn';
                    muteBtn.innerText = '🔊';
                    muteBtn.onclick = () => this.toggleMute();
                    controls.appendChild(muteBtn);
                }

                this.bestElem.innerText = this.bestScore;
                this.setupEvents();
                this.newGame();
            }

            initAudio() {
                if (this.audioCtx) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.audioCtx = new AudioContext();
                this.startBGM();
            }

            toggleMute() {
                this.isMuted = !this.isMuted;
                const muteBtn = document.getElementById('mute-btn');
                if (muteBtn) muteBtn.innerText = this.isMuted ? '🔇' : '🔊';
                
                if (this.isMuted) {
                    this.stopBGM();
                } else {
                    this.initAudio();
                    if (this.audioCtx && this.audioCtx.state === 'suspended') this.audioCtx.resume();
                    this.startBGM();
                }
            }

            playMergeSound(value) {
                if (!this.audioCtx || this.isMuted) return;
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();

                const t = this.audioCtx.currentTime;
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                
                const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
                const index = Math.log2(value) - 1; 
                const freq = notes[index % notes.length] * (1 + Math.floor(index / notes.length));

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                osc.frequency.exponentialRampToValueAtTime(freq * 2, t + 0.1);

                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);

                osc.connect(gain);
                gain.connect(this.audioCtx.destination);
                osc.start(t);
                osc.stop(t + 0.3);

                if (value >= 64) {
                    const osc2 = this.audioCtx.createOscillator();
                    const gain2 = this.audioCtx.createGain();
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(freq * 1.5, t);
                    gain2.gain.setValueAtTime(0.1, t);
                    gain2.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                    osc2.connect(gain2);
                    gain2.connect(this.audioCtx.destination);
                    osc2.start(t);
                    osc2.stop(t + 0.4);
                }
            }

            startBGM() {
                if (this.isMuted || !this.audioCtx || this.bgmNodes.length > 0) return;

                const sequence = [
                    { f: 261.63, d: 0.2 }, { f: 329.63, d: 0.2 }, { f: 392.00, d: 0.2 }, { f: 493.88, d: 0.2 },
                    { f: 220.00, d: 0.2 }, { f: 261.63, d: 0.2 }, { f: 329.63, d: 0.2 }, { f: 392.00, d: 0.2 }
                ];
                
                let noteIndex = 0;
                const playNextNote = () => {
                    if (this.isMuted || !this.audioCtx) return;
                    const t = this.audioCtx.currentTime;
                    const note = sequence[noteIndex];
                    
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.value = note.f;
                    
                    gain.gain.setValueAtTime(0.03, t);
                    gain.gain.linearRampToValueAtTime(0.01, t + note.d * 2);
                    
                    osc.connect(gain);
                    gain.connect(this.audioCtx.destination);
                    
                    osc.start(t);
                    osc.stop(t + note.d * 2.5);
                    
                    this.bgmNodes.push(osc);
                    if (this.bgmNodes.length > 20) this.bgmNodes.shift();

                    noteIndex = (noteIndex + 1) % sequence.length;
                    this.bgmTimeout = setTimeout(playNextNote, note.d * 1000);
                };
                playNextNote();
            }

            stopBGM() {
                if (this.bgmTimeout) clearTimeout(this.bgmTimeout);
                this.bgmNodes.forEach(node => {
                    try { node.stop(); } catch(e) {}
                });
                this.bgmNodes = [];
            }

            getTileName(val) {
                const key = `tile_${val}`;
                const evolutionNames = {
                    2: 'Data', 4: 'Algorithm', 8: 'Model', 16: 'Neural Net', 32: 'Deep Learning',
                    64: 'Transformer', 128: 'LLM', 256: 'AGI', 512: 'Super AI', 1024: 'Singularity', 2048: 'AI Overlord'
                };
                return (window.translations && window.translations[window.currentLang] && window.translations[window.currentLang][key]) 
                    || evolutionNames[val] || val;
            }

            setupEvents() {
                document.addEventListener('keydown', (e) => {
                    if (this.isGameOver || this.isMoving) return;
                    const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
                    if (map[e.key]) {
                        e.preventDefault();
                        this.move(map[e.key]);
                    }
                });

                let tsX, tsY;
                document.addEventListener('touchstart', (e) => {
                    tsX = e.touches[0].clientX;
                    tsY = e.touches[0].clientY;
                }, { passive: false });

                document.addEventListener('touchmove', (e) => {
                    if (e.target.closest('#game-board-container')) e.preventDefault();
                }, { passive: false });

                document.addEventListener('touchend', (e) => {
                    if (this.isGameOver || this.isMoving || !tsX || !tsY) return;
                    const dx = e.changedTouches[0].clientX - tsX;
                    const dy = e.changedTouches[0].clientY - tsY;
                    if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                        if (Math.abs(dx) > Math.abs(dy)) this.move(dx > 0 ? 'right' : 'left');
                        else this.move(dy > 0 ? 'down' : 'up');
                    }
                    tsX = tsY = null;
                }, { passive: false });

                document.getElementById('new-game-btn').onclick = () => this.newGame();
                document.getElementById('restart-btn').onclick = () => { this.modal.classList.add('hidden'); this.newGame(); };
                document.getElementById('undo-btn').onclick = () => this.undo();
                document.getElementById('share-btn').onclick = () => this.share();
                document.getElementById('modal-share-btn').onclick = () => this.share();
                this.submitBtn.onclick = () => this.submitScore();
            }

            async loadRankings() {
                if (typeof db === 'undefined' || !db) {
                    this.rankList.innerHTML = '<div style="text-align:center; color:#ff4444;">Ranking unavailable</div>';
                    return;
                }
                try {
                    this.rankList.innerHTML = '<div style="text-align:center;">Loading...</div>';
                    const snapshot = await db.collection('ai_evolution_rankings').orderBy('score', 'desc').limit(5).get();
                    this.rankList.innerHTML = snapshot.docs.map(doc => {
                        const d = doc.data();
                        return `<div class="rank-item"><span>${d.nickname}</span><span>${d.score}</span></div>`;
                    }).join('') || '<div style="text-align:center;">No records yet</div>';
                } catch (e) {
                    console.error("Ranking Load Error:", e);
                    this.rankList.innerHTML = '<div style="text-align:center;">Error loading</div>';
                }
            }

            async submitScore() {
                const nick = this.nickInput.value.trim();
                if (!nick) {
                    alert("Please enter a nickname.");
                    return;
                }
                if (this.score === 0) return;
                if (typeof db === 'undefined' || !db) {
                    alert("Database connection failed.");
                    return;
                }
                
                this.submitBtn.disabled = true;
                this.submitBtn.innerText = "...";
                try {
                    await db.collection('ai_evolution_rankings').add({
                        nickname: nick,
                        score: this.score,
                        maxTile: this.maxTileReached,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    this.nickInput.value = "";
                    this.submitBtn.innerText = "DONE";
                    this.loadRankings();
                } catch (e) {
                    console.error("Score Submit Error:", e);
                    alert("Failed to save score: " + e.message);
                    this.submitBtn.disabled = false;
                    this.submitBtn.innerText = "SAVE";
                }
            }

            newGame() {
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                this.undoBuffer = null;
                this.maxTileReached = 2;
                this.isGameOver = false;
                this.updateScoreDisplay();
                this.undoBtn.disabled = true;
                this.submitBtn.disabled = false;
                this.statusMsg.innerText = "";
                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            addRandomTile() {
                const empty = [];
                for (let r = 0; r < 4; r++)
                    for (let c = 0; c < 4; c++)
                        if (this.grid[r][c] === 0) empty.push({ r, c });
                if (empty.length > 0) {
                    const { r, c } = empty[Math.floor(Math.random() * empty.length)];
                    this.grid[r][c] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            move(dir) {
                if (this.isMoving) return;
                this.initAudio();
                this.isMoving = true;

                const prevGrid = JSON.stringify(this.grid);
                const rotate = (g) => g[0].map((_, i) => g.map(row => row[i]).reverse());
                
                let tempGrid = JSON.parse(prevGrid);
                let moveScore = 0;
                let moveMaxTile = this.maxTileReached;

                const slide = (row) => {
                    let filtered = row.filter(v => v !== 0);
                    let newRow = [];
                    for (let i = 0; i < filtered.length; i++) {
                        if (i < filtered.length - 1 && filtered[i] === filtered[i + 1]) {
                            const newVal = filtered[i] * 2;
                            newRow.push(newVal);
                            moveScore += newVal;
                            if (newVal > moveMaxTile) moveMaxTile = newVal;
                            this.playMergeSound(newVal);
                            i++;
                        } else {
                            newRow.push(filtered[i]);
                        }
                    }
                    while (newRow.length < 4) newRow.push(0);
                    return newRow;
                };

                if (dir === 'up') {
                    tempGrid = rotate(rotate(rotate(tempGrid))).map(slide);
                    tempGrid = rotate(tempGrid);
                } else if (dir === 'down') {
                    tempGrid = rotate(tempGrid).map(slide);
                    tempGrid = rotate(rotate(rotate(tempGrid)));
                } else if (dir === 'right') {
                    tempGrid = tempGrid.map(r => slide(r.reverse()).reverse());
                } else {
                    tempGrid = tempGrid.map(slide);
                }

                if (JSON.stringify(tempGrid) !== prevGrid) {
                    this.undoBuffer = { grid: JSON.parse(prevGrid), score: this.score, maxTile: this.maxTileReached };
                    this.undoBtn.disabled = false;
                    
                    this.grid = tempGrid;
                    this.score += moveScore;
                    
                    if (moveMaxTile > this.maxTileReached) {
                        this.notifyEvolution(moveMaxTile);
                    }

                    this.addRandomTile();
                    this.updateScoreDisplay();
                    this.render();
                    
                    if (this.checkGameOver()) {
                        setTimeout(() => this.endGame(), 500);
                    }
                }

                setTimeout(() => { this.isMoving = false; }, 100);
            }

            undo() {
                if (!this.undoBuffer) return;
                this.grid = this.undoBuffer.grid;
                this.score = this.undoBuffer.score;
                this.maxTileReached = this.undoBuffer.maxTile;
                this.undoBuffer = null;
                this.undoBtn.disabled = true;
                this.updateScoreDisplay();
                this.render();
            }

            updateScoreDisplay() {
                const scoreVal = document.getElementById('current-score');
                if (scoreVal) scoreVal.innerText = this.score;
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    const bestVal = document.getElementById('best-score');
                    if (bestVal) bestVal.innerText = this.bestScore;
                    localStorage.setItem('ai_evolution_best', this.bestScore);
                }
            }

            notifyEvolution(val) {
                this.maxTileReached = val;
                const name = this.getTileName(val);
                this.statusMsg.innerText = `Evolution Reached: ${name}!`;
                this.statusMsg.classList.remove('fade-out');
                
                setTimeout(() => {
                    this.statusMsg.classList.add('fade-out');
                    setTimeout(() => {
                        if (this.statusMsg.classList.contains('fade-out')) this.statusMsg.innerText = "";
                    }, 500);
                }, 2000);
            }

            render() {
                this.tileLayer.innerHTML = '';
                this.grid.forEach((row, r) => {
                    row.forEach((val, c) => {
                        if (val !== 0) {
                            const tile = document.createElement('div');
                            tile.className = `tile tile-${val} tile-new`;
                            tile.style.top = `${r * 25}%`;
                            tile.style.left = `${c * 25}%`;
                            
                            const inner = document.createElement('span');
                            inner.className = 'tile-inner';
                            inner.innerText = this.getTileName(val);
                            tile.appendChild(inner);
                            
                            this.tileLayer.appendChild(tile);
                        }
                    });
                });
            }

            checkGameOver() {
                for (let r = 0; r < 4; r++)
                    for (let c = 0; c < 4; c++)
                        if (this.grid[r][c] === 0) return false;
                for (let r = 0; r < 4; r++)
                    for (let c = 0; c < 4; c++) {
                        if (c < 3 && this.grid[r][c] === this.grid[r][c + 1]) return false;
                        if (r < 3 && this.grid[r][c] === this.grid[r + 1][c]) return false;
                    }
                return true;
            }

            endGame() {
                this.isGameOver = true;
                const finalStage = document.getElementById('final-stage-name');
                const finalScore = document.getElementById('final-score');
                if (finalStage) finalStage.innerText = this.getTileName(this.maxTileReached);
                if (finalScore) finalScore.innerText = this.score;
                this.modal.classList.remove('hidden');
                this.loadRankings();
            }

            share() {
                const stageName = this.getTileName(this.maxTileReached);
                const text = `[AI EVOLUTION 2048]\nStage: ${stageName}\nScore: ${this.score}\nPlay: trackingsa.com/ai-evolution`;
                if (navigator.share) {
                    navigator.share({ title: 'AI EVOLUTION 2048', text: text, url: 'https://trackingsa.com/ai-evolution' });
                } else {
                    navigator.clipboard.writeText(text).then(() => alert("Result copied to clipboard!"));
                }
            }
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                window.gameInstance = new AIEvolution2048();
            }, 100);
        });
    </script>
