    <!-- HEAD_INJECTION -->

    <style>
        :root {
            --bg-dark: #0f172a;
            --board-bg: #1e293b;
            --cell-bg: #334155;
            --text-primary: #f8fafc;
            --neon-blue: #38bdf8;
            --neon-purple: #c084fc;
            --transition-ms: 150ms;
            --nav-height: 64px;
        }

        body {
            margin: 0;
            padding: 0;
            padding-top: var(--nav-height);
            background-color: var(--bg-dark);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        #ai-evolution-game {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            position: relative;
            z-index: 10;
        }

        #game-wrapper {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 5px;
        }

        .game-title-area h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            font-size: 0.9rem;
            color: var(--neon-purple);
            font-weight: bold;
            margin-top: -5px;
        }

        .score-container {
            display: flex;
            gap: 8px;
        }

        .score-box {
            background: var(--board-bg);
            min-width: 70px;
            padding: 6px 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--cell-bg);
        }

        .score-box .label {
            font-size: 0.6rem;
            color: var(--neon-blue);
            font-weight: bold;
        }

        .score-box div:last-child {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .main-controls {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--cell-bg);
            background: var(--board-bg);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #status-message {
            height: 24px;
            text-align: center;
            color: var(--neon-purple);
            font-weight: bold;
            font-size: 0.95rem;
            text-shadow: 0 0 8px rgba(192, 132, 252, 0.4);
            transition: opacity 0.5s ease;
        }

        #game-board-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--board-bg);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .grid-layer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background: var(--cell-bg);
            border-radius: 6px;
        }

        #tile-layer {
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
        }

        .tile {
            position: absolute;
            width: calc(25% - 9px);
            height: calc(25% - 9px);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px;
            transition: left var(--transition-ms) ease-in-out, top var(--transition-ms) ease-in-out, transform 100ms ease-out;
            z-index: 10;
        }

        .tile-inner {
            font-weight: 900;
            font-size: 1.1rem;
            text-align: center;
            word-break: break-word;
            line-height: 1;
        }

        .tile-2 { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .tile-4 { background: #334155; color: #cbd5e1; border: 1px solid var(--neon-blue); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        .tile-8 { background: #0c4a6e; color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .tile-16 { background: #1e3a8a; color: var(--neon-blue); border: 1px solid var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); }
        .tile-32 { background: #4c1d95; color: var(--neon-purple); border: 1px solid var(--neon-purple); }
        .tile-64 { background: #581c87; color: var(--neon-purple); border: 1px solid var(--neon-purple); box-shadow: 0 0 15px rgba(192, 132, 252, 0.3); }
        .tile-128 { background: #701a75; color: #f472b6; border: 1px solid #f472b6; font-size: 0.7rem; }
        .tile-256 { background: #831843; color: #fb7185; border: 1px solid #fb7185; box-shadow: 0 0 20px rgba(251, 113, 133, 0.4); }
        .tile-512 { background: #991b1b; color: #fca5a5; border: 1px solid #ef4444; }
        .tile-1024 { background: #000; color: #fff; border: 2px solid var(--neon-blue); box-shadow: 0 0 25px var(--neon-blue); font-size: 0.65rem; }
        .tile-2048 { background: #000; color: gold; border: 2px solid var(--neon-purple); box-shadow: 0 0 35px var(--neon-purple); animation: surge 2s infinite; }

        @keyframes surge {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.03); filter: brightness(1.3); }
        }

        .tile-new { animation: appear 200ms ease-out; }
        .tile-merged { animation: pop 200ms ease-in-out; }

        @keyframes appear { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        /* Modals */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal.hidden { display: none; }

        .modal-content {
            background: var(--board-bg);
            width: 85%;
            max-width: 320px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
        }

        @media (max-width: 768px) {
            #ai-evolution-game { padding: 10px; }
            #game-wrapper { margin: 0 auto; }
        }
    </style>
