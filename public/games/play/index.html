        .play-container {
            display: flex;

            background: var(--bg-main);
            padding: 12px 20px;

            align-items: center;
            border-bottom: 1px solid var(--p-blue-soft);

            align-items: center;
            gap: 8px;

            color: var(--text-main);

        }
        .game-viewport {
            flex: 1;
            width: 100%;
            border: none;
            background: #000;
        }
        .game-bottom-bar {
            background: var(--bg-main);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--p-blue-soft);
        }
        .game-info-mini h2 { margin: 0; font-size: 1.1rem; color: var(--text-main); }
        .game-info-mini p { margin: 2px 0 0 0; font-size: 0.85rem; color: var(--text-sub); }
        .play-stats {
            font-size: 0.85rem;
            color: var(--p-blue);
            font-weight: 700;
        }
        @media (max-width: 600px) {
            .game-bottom-bar { flex-direction: column; gap: 10px; align-items: flex-start; }
        }
