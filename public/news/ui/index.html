<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="/news/ui/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="news_home">뉴스 홈 - Tracking SA</title>
</head>
<body>
    <!-- Financial Ticker Tape -->
    <div class="ticker-container">
        <script type="module" src="https://widgets.tradingview-widget.com/w/kr/tv-ticker-tape.js"></script>
        <tv-ticker-tape symbols='FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,FX:EURUSD,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,CMCMARKETS:GOLD'></tv-ticker-tape>
    </div>

    <main>
        <section class="news-hero">
            <div class="news-hero-inner">
                <h1 data-i18n="news_home_title">인베스터 인사이트</h1>
                <p data-i18n="news_home_desc">전문가의 시각으로 돈과 기술의 흐름을 꿰뚫는 전문 칼럼. 단순 뉴스를 넘어선 독보적인 투자 인사이트를 매일 만나보세요.</p>
            </div>
        </section>
        <section class="news-section-main">
            <!-- NEWS_INJECTION_POINT -->
            <div class="pagination" id="news-pagination" hidden>
                <button class="pagination-button" id="prev-page" data-i18n="prev_button">이전</button>
                <span class="current-page" id="page-indicator">1</span>
                <button class="pagination-button" id="next-page" data-i18n="next_button">다음</button>
            </div>
        </section>
    </main>

    <script src="/news/translations.js"></script>
    <script src="/news/application/news-client.js" type="module"></script>
    <script src="/news/application/news-pagination.js" type="module"></script>
</body>
</html>
