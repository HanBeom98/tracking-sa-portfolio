name: Manual Glossary Update

on:
  workflow_dispatch: # 수동 실행 트리거

jobs:
  update-glossary:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run Glossary Extractor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        run: node multi-agent-system/glossary-extractor.js

      - name: Build site with updated glossary
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          npm run build

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add src/domains/glossary/application/glossary-data.js public/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(glossary): auto-extract and append new terms" && git push)
