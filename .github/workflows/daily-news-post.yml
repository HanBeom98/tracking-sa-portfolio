name: Daily AI News Post

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'logs/**'
      - 'README.md'
      - 'blueprint.md'
  schedule:
    - cron: '6 22 * * *'
    - cron: '12 12 * * *'
  workflow_dispatch:
    inputs:
      generate_news:
        description: '새 뉴스를 생성하시겠습니까?'
        type: boolean
        default: false

permissions:
  contents: write
  deployments: write

concurrency:
  group: daily-ai-news-post
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Build Script (Smart Execution)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          BASE_URL: "https://trackingsa.com/"
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "schedule" || ( "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.generate_news }}" == "true" ) ]]; then
            python main.py
          else
            python main.py --build-only
          fi

      - name: Commit News Build (schedule only)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.generate_news == 'true')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ logs/processed_articles.log
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update news build $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
