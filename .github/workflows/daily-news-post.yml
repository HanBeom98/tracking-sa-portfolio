name: Daily AI News Post

on:
  schedule:
    - cron: '12 12 * * *'
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode for manual execution"
        required: true
        default: "generate_and_deploy"
        type: choice
        options:
          - generate_and_deploy
          - generate_only

permissions:
  contents: write

concurrency:
  group: daily-ai-news-post
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Firebase web config secrets
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        run: |
          set -euo pipefail
          test -n "$VITE_FIREBASE_API_KEY" || { echo "Missing secret: VITE_FIREBASE_API_KEY"; exit 1; }
          test -n "$VITE_FIREBASE_MESSAGING_SENDER_ID" || { echo "Missing secret: VITE_FIREBASE_MESSAGING_SENDER_ID"; exit 1; }

      - name: Run News Generation + Build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          BASE_URL: "https://trackingsa.com/"
        run: |
          set -euo pipefail
          python main.py

      - name: Commit News Build
        id: commit_news
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ logs/processed_articles.log
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: update news build $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages (Direct Upload)
        if: steps.commit_news.outputs.committed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'generate_and_deploy')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=tracking-sa --branch=main

      - name: Workflow Summary
        if: always()
        run: |
          echo "event=${{ github.event_name }}"
          echo "run_mode=${{ github.event.inputs.run_mode || 'scheduled' }}"
          echo "committed=${{ steps.commit_news.outputs.committed || 'false' }}"
