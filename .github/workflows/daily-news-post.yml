name: Daily AI News Post

on:
  schedule:
    - cron: '6 22 * * *'  # UTC 22:06 = KST 07:06 (오전 7시 6분)
    - cron: '12 12 * * *' # UTC 12:12 = KST 21:12 (오후 9시 12분)
  workflow_dispatch: # 직접 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    # 깃허브 액션이 저장소에 글을 쓸 수 있도록 권한 부여
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser python-dotenv requests markdown

      - name: Show posts directory before script runs
        run: |
          echo "--- Contents of posts/ before running main.py ---"
          ls -R posts/ || echo "posts/ directory does not exist yet."

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Show posts directory after script runs
        run: |
          echo "--- Contents of posts/ after running main.py ---"
          ls -R posts/ || echo "posts/ directory not found."

      - name: Check git status
        run: |
          echo "--- Git status after running main.py ---"
          git status

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ processed_articles.log
          git commit -m "Auto-post news updates $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push