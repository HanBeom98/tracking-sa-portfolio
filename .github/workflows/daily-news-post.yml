name: Daily AI News Post

on:
  schedule:
    - cron: '6 22 * * *'
    - cron: '12 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: daily-ai-news-post
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Build Script (Multi-Agent News Generation)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          BASE_URL: "https://trackingsa.com/"
        run: |
          set -euo pipefail
          # 1. Generate news using Multi-Agent Team and store in Firestore
          python main.py
          # 2. Final build from Firestore data
          python main.py --build-only

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'tracking-sa'
          directory: 'public'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Log changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_articles.log
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update processed articles log $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
