name: Daily AI News Post

on:
  schedule:
    - cron: '6 22 * * *'
    - cron: '12 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ai-news-post
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          BASE_URL: "https://trackingsa.com/"
        run: |
          set -euo pipefail
          # 1. Generate news and store in Firestore
          python main.py
          # 2. Final build from Firestore data
          python main.py --build-only

      - name: Commit and Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit the log file to keep the repository clean.
          # Articles are now stored in Firestore and generated into public/ (which should be ignored or handled by hosting).
          git add processed_articles.log

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update processed articles log $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
