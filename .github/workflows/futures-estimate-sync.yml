name: Futures Estimate Sync

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: futures-estimate-sync
  cancel-in-progress: false

jobs:
  sync-futures:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Debug checkout revision
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          git rev-parse --short HEAD
          sed -n '1,40p' scripts/sync_futures_estimate.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync futures estimate to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          STOOQ_SYMBOL: ${{ secrets.STOOQ_SYMBOL }}
          KOSPI200_BASE: ${{ secrets.KOSPI200_BASE }}
        run: |
          set -e
          for i in 1 2 3; do
            echo "sync attempt ${i}/3"
            if python scripts/sync_futures_estimate.py; then
              exit 0
            fi
            if [ "$i" -lt 3 ]; then
              echo "retry after 12s..."
              sleep 12
            fi
          done
          exit 1
