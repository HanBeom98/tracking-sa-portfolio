name: Futures Estimate Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: futures-estimate-sync
  cancel-in-progress: false

jobs:
  sync-futures:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Debug checkout revision
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          git rev-parse --short HEAD
          sed -n '1,40p' scripts/sync_futures_estimate.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync futures estimate to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
          KIS_OAUTH_PATH: ${{ secrets.KIS_OAUTH_PATH }}
          KIS_QUOTE_PATH: ${{ secrets.KIS_QUOTE_PATH }}
          KIS_TR_ID: ${{ secrets.KIS_TR_ID }}
          KIS_CUSTTYPE: ${{ secrets.KIS_CUSTTYPE }}
          KIS_FID_COND_MRKT_DIV_CODE: ${{ secrets.KIS_FID_COND_MRKT_DIV_CODE }}
          KIS_FID_INPUT_ISCD: ${{ secrets.KIS_FID_INPUT_ISCD }}
          KOSPI200_BASE: ${{ secrets.KOSPI200_BASE }}
        run: |
          python scripts/sync_futures_estimate.py
