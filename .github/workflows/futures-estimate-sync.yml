name: Futures Estimate Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: futures-estimate-sync
  cancel-in-progress: false

jobs:
  sync-futures:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Debug checkout revision
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          git rev-parse --short HEAD
          sed -n '1,40p' scripts/sync_futures_estimate.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync futures estimate to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          STOOQ_SYMBOL: ${{ secrets.STOOQ_SYMBOL }}
          KOSPI200_BASE: ${{ secrets.KOSPI200_BASE }}
        run: |
          python scripts/sync_futures_estimate.py
