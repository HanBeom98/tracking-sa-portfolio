name: Futures Base Refresh

on:
  schedule:
    # 15:46 KST on weekdays (UTC+9 => 06:46 UTC)
    - cron: "46 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: futures-base-refresh
  cancel-in-progress: false

jobs:
  refresh-base:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update daily KOSPI200 futures base
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          KOSPI200_BASE: ${{ secrets.KOSPI200_BASE }}
        run: |
          python scripts/update_kospi200_futures_base.py
