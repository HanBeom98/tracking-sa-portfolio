name: Auto Update News and Deploy

on:
  push:
    branches: [ main ]  # main 브랜치에 푸시될 때 작동
  schedule:
    - cron: '0 0 * * *' # 매일 자정에 자동으로 뉴스 갱신 (선택 사항)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 자동 푸시 권한

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # GitHub Secret에 등록 필요
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ posts/ processed_articles.log
          git commit -m "Auto-update: News and Public files [skip ci]" || echo "No changes to commit"
          git push origin main