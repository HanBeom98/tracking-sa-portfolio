name: Site Deploy (Test & Build)

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "main.py"
      - "requirements.txt"
      - "package.json"
      - "package-lock.json"
      - "firebase.json"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "index.html"
      - "logo.svg"
      - "favicon.svg"
      - "ads.txt"
      - "_redirects"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1단계: 테스트 수행
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Run Firestore Rules Tests
        run: npm run test:rules

  # 2단계: 테스트 성공 시에만 빌드 및 배포
  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm install

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Files & Firebase Config
        run: |
          set -euo pipefail
          echo "Checking directory structure..."
          ls -la
          echo "Verifying firebase.json content..."
          cat firebase.json
          test -f firestore.rules || { echo "firestore.rules missing"; exit 1; }

      - name: Build public site only
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          BASE_URL: "https://trackingsa.com/"
        run: |
          set -euo pipefail
          python main.py --build-only

      - name: Deploy Firestore Rules and Indexes
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          # Create temporary service account key file
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$HOME/firebase-sa-key.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/firebase-sa-key.json"
          
          # Deploy using global firebase-tools with explicit project and force flag
          firebase deploy --only firestore --project tracking-sa-295db --non-interactive
          
          # Cleanup
          rm "$HOME/firebase-sa-key.json"

      - name: Deploy to Cloudflare Pages (Direct Upload)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=tracking-sa --branch=main
# trigger
