name: Site Deploy (Build Only)

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "main.py"
      - "requirements.txt"
      - "package.json"
      - "package-lock.json"
      - "firebase.json"
      - "firestore.rules"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-deploy-build-only
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm install

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Firebase web config secrets
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        run: |
          set -euo pipefail
          test -n "$VITE_FIREBASE_API_KEY" || { echo "Missing secret: VITE_FIREBASE_API_KEY"; exit 1; }
          test -n "$VITE_FIREBASE_MESSAGING_SENDER_ID" || { echo "Missing secret: VITE_FIREBASE_MESSAGING_SENDER_ID"; exit 1; }

      - name: Build public site only
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          BASE_URL: "https://trackingsa.com/"
        run: |
          set -euo pipefail
          python main.py --build-only

      - name: Commit Build Output
        id: commit_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          if git diff --cached --quiet; then
            echo "No build changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(build): update public output $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages (Direct Upload)
        if: steps.commit_build.outputs.committed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=tracking-sa --branch=main
