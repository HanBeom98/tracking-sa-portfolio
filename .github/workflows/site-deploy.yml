name: Site Deploy (Test & Build)

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "main.py"
      - "requirements.txt"
      - "package.json"
      - "package-lock.json"
      - "firebase.json"
      - "firestore.rules"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1단계: 테스트 수행
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Run Firestore Rules Tests
        run: npm run test:rules

  # 2단계: 테스트 성공 시에만 빌드 및 배포
  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm install

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Firebase web config secrets
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        run: |
          set -euo pipefail
          test -n "$VITE_FIREBASE_API_KEY" || { echo "Missing secret: VITE_FIREBASE_API_KEY"; exit 1; }
          test -n "$VITE_FIREBASE_MESSAGING_SENDER_ID" || { echo "Missing secret: VITE_FIREBASE_MESSAGING_SENDER_ID"; exit 1; }

      - name: Build public site only
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          BASE_URL: "https://trackingsa.com/"
        run: |
          set -euo pipefail
          python main.py --build-only

      - name: Deploy Firestore Rules
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          # Verify directory content
          ls -la
          
          # Create temporary service account key file
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > firebase-sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=firebase-sa-key.json
          
          # Install firebase-tools and deploy with explicit project ID
          npx firebase-tools deploy --only firestore:rules --project tracking-sa-295db --json
          
          # Cleanup
          rm firebase-sa-key.json

      - name: Deploy to Cloudflare Pages (Direct Upload)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=tracking-sa --branch=main
