name: Site Deploy (Test & Build)

on:
#  push:
#    branches:
#      - main
#    paths:
#      - "src/**"
#      - "functions/**"
#      - "tests/**"
#      - "main.py"
#      - "requirements.txt"
#      - "package.json"
#      - "package-lock.json"
#      - "firebase.json"
#      - "firestore.rules"
#      - "firestore.indexes.json"
  workflow_dispatch:
      - "index.html"
      - "logo.svg"
      - "favicon.svg"
      - "ads.txt"
      - "_redirects"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1단계: 변경 기반 스마트 테스트 수행
  test:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.filter.outputs.any_changed }}
      domains: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Enforce Public Edit Policy
        run: npm run check:public-edit-policy

      - name: Enforce Source Of Truth (src -> public mirrors)
        run: npm run check:source-of-truth

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'src/shared/**'
              - 'package.json'
              - 'tests/unit/app-shell-runtime.test.js'
            rules:
              - 'firestore.rules'
              - 'tests/unit/firestore-rules-guards.test.js'
            account:
              - 'src/domains/account/**'
              - 'tests/unit/account-*.test.js'
            ai-test:
              - 'src/domains/ai-test/**'
              - 'tests/unit/ai-test-*.test.js'
            animal-face:
              - 'src/domains/animal-face/**'
              - 'tests/unit/animal-face-*.test.js'
            auth:
              - 'src/domains/auth/**'
              - 'tests/unit/auth-*.test.js'
            board:
              - 'src/domains/board/**'
              - 'tests/unit/board-*.test.js'
            fortune:
              - 'src/domains/fortune/**'
              - 'tests/unit/fortune-*.test.js'
            futures:
              - 'src/domains/futures-estimate/**'
              - 'tests/unit/futures-*.test.js'
            lucky:
              - 'src/domains/lucky-recommendation/**'
              - 'tests/unit/lucky-*.test.js'
            news:
              - 'src/domains/news/**'
              - 'tests/unit/news-*.test.js'
            search:
              - 'src/domains/search/**'
              - 'tests/unit/search-*.test.js'
            games:
              - 'src/domains/games/**'
              - 'tests/unit/games-*.test.js'

      - name: Run Targeted Unit Tests
        if: steps.filter.outputs.any_changed == 'true'
        run: |
          # If shared code or core files changed, run all tests
          if echo '${{ steps.filter.outputs.changes }}' | grep -q '"shared"'; then
            echo "Shared code changed. Running all unit tests..."
            npm run test:unit
          else
            # Run only tests for changed domains
            DOMAINS=$(echo '${{ steps.filter.outputs.changes }}' | jq -r '.[]')
            for DOMAIN in $DOMAINS; do
              case "$DOMAIN" in
                rules) npm run test:rules ;;
                account) npm run test:unit:account ;;
                ai-test) npm run test:unit:ai-test ;;
                animal-face) npm run test:unit:animal-face ;;
                auth) npm run test:unit:auth ;;
                board) npm run test:unit:board ;;
                fortune) npm run test:unit:fortune ;;
                futures) npm run test:unit:futures ;;
                lucky) npm run test:unit:lucky ;;
                news) npm run test:unit:news ;;
                search) npm run test:unit:search ;;
                games) npm run test:unit:games ;;
              esac
            done
          fi

  # 2단계: 테스트 성공 시에만 빌드 및 배포
  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Files & Firebase Config
        run: |
          set -euo pipefail
          echo "Checking directory structure..."
          ls -la
          echo "Verifying firebase.json content..."
          cat firebase.json
          test -f firestore.rules || { echo "firestore.rules missing"; exit 1; }

      - name: Build public site only
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          BASE_URL: "https://trackingsa.com/"
        run: |
          set -euo pipefail
          python main.py --build-only

      - name: Verify Build Artifacts
        run: |
          echo "Checking public directory..."
          ls -R public/ | head -n 20
          du -sh public/
          if [ ! -d "public" ] || [ ! -f "public/index.html" ]; then
            echo "Error: Build failed to generate public/index.html"
            exit 1
          fi

      - name: Deploy Firestore Rules and Indexes
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          # Create temporary service account key file
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$HOME/firebase-sa-key.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/firebase-sa-key.json"
          
          # Deploy using global firebase-tools with explicit project and force flag
          firebase deploy --only firestore --project tracking-sa-295db --non-interactive
          
          # Cleanup
          rm "$HOME/firebase-sa-key.json"

      - name: Deploy to Cloudflare Pages (Direct Upload)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=tracking-sa --branch=main
