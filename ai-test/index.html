<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="ai_tendency_test_title">AI 성향 테스트 - Tracking SA</title>
</head>
<body>
    <main class="ai-test-page">
        <section class="test-intro">
            <h1 data-i18n="ai_test_h1">나와 가장 닮은 인공지능 모델은?</h1>
            <p data-i18n="ai_test_p1">간단한 질문에 답하고, 당신의 AI 성향을 알아보세요!</p>
            <button id="start-test-button" class="action-button" data-i18n="start_test">테스트 시작하기</button>
        </section>
        <section id="quiz-section" class="quiz-section" style="display: none;">
            <h2 id="question-text"></h2>
            <div id="answers-container" class="answers-container"></div>
            <button id="next-button" class="action-button" data-i18n="next_button">다음</button>
        </section>
        <section id="result-section" class="result-section" style="display: none;">
            <h2 data-i18n="ai_test_result_h2">당신과 가장 닮은 AI 모델은...</h2>
            <div class="ai-result">
                <p id="result-emoji" class="result-emoji"></p>
                <p id="result-name" class="result-name"></p>
                <p id="result-description" class="result-description"></p>
            </div>
            <div class="result-actions">
                <button id="copy-link-button" class="action-button" data-i18n="copy_link">결과 링크 복사</button>
                <button id="retake-test-button" class="action-button" data-i18n="retake_test">다시 테스트하기</button>
            </div>
        </section>
    </main>
    <script src="./ai-test.js"></script>
</body>
</html>
