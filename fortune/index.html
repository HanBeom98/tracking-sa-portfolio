<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="saju_test_title">AI 오늘의 운세 - Tracking SA</title>
</head>
<body>
    <main>
        <section class="animal-face-test">
            <h1 data-i18n='saju_title'>AI 실시간 오늘의 운세</h1>
            <p data-i18n='saju_desc1'>이름과 생년월일시 정보를 입력하여 AI가 분석한 오늘의 운세 풀이를 확인해보세요.</p>
            <div class="saju-input-section">
                <div class="input-form-group">
                    <label for="user-name" data-i18n="name_label">이름:</label>
                    <input type="text" id="user-name" placeholder="이름을 입력하세요">
                </div>
                <div class="birthdate-selectors">
                    <select id="birth-year"></select>
                    <select id="birth-month"></select>
                    <select id="birth-day"></select>
                </div>
                <div class="input-form-group">
                    <label for="birth-hour" data-i18n="birthtime_label">태어난 시간:</label>
                    <select id="birth-hour">
                        <option value="unknown" data-i18n="unknown_option">모름</option>
                    </select>
                </div>
                <div class="gender-buttons">
                    <input type="radio" id="gender-male" name="gender" value="male" checked>
                    <label for="gender-male" data-i18n="gender_male_label">남성</label>
                    <input type="radio" id="gender-female" name="gender" value="female">
                    <label for="gender-female" data-i18n="gender_female_label">여성</label>
                </div>
                <button type="button" id="get-saju-button" class="go-test-button" data-i18n="get_saju_reading">운세 풀이하기</button>
            </div>
            <div id="loading-indicator" class="loading-indicator" style="display:none;">
                <div class="spinner"></div>
                <p data-i18n="ai_reading_fortune">분석 중...</p>
            </div>
            <div id="result-container" class="result-section" style="display:none;">
                <h2 data-i18n="saju_result_h2">운세 풀이 결과</h2>
                <div id="saju-reading-text"></div>
                <button type="button" id="retake-button" class="go-test-button" data-i18n="retake_test">다시 테스트</button>
            </div>
        </section>
    </main>
    <script src="./fortune.js" type="module"></script>
</body>
</html>
