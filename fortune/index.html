<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="./style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="saju_test_title">AI 오늘의 운세 - 실시간 무료 운세 분석 | Tracking SA</title>
    <meta name="description" content="AI가 실시간으로 분석하는 당신의 오늘 운세. 이름과 생년월일 정보로 풀어보는 정교한 운세 분석과 행운의 조언을 무료로 확인하세요.">
    <meta property="og:title" content="AI 오늘의 운세 - 실시간 무료 운세 분석 | Tracking SA">
    <meta property="og:description" content="AI가 알려주는 당신의 오늘 운세는? 지금 바로 무료로 확인해보세요!">
    <meta property="og:image" content="/logo.svg">
    <meta property="og:url" content="https://trackingsa.com/fortune/">
</head>
<body>
    <main>
        <section class="fortune-page-container">
            <h1 data-i18n='saju_title'>AI 실시간 오늘의 운세</h1>
            <p data-i18n='saju_desc1'>이름과 생년월일 정보를 입력하여 AI가 분석한 오늘의 운세 풀이를 확인해보세요.</p>
            
            <div class="saju-input-section">
                <!-- 이름 입력 그룹 -->
                <div class="input-form-group">
                    <label for="user-name" data-i18n="name_label">이름:</label>
                    <input type="text" id="user-name" placeholder="이름을 입력하세요">
                </div>

                <!-- 생년월일 그룹 -->
                <div class="input-form-group">
                    <label data-i18n="birthdate_label">생년월일:</label>
                    <div class="birthdate-selectors">
                        <select id="birth-year"></select>
                        <span class="unit-span" data-i18n="year_unit">년</span>
                        <select id="birth-month"></select>
                        <span class="unit-span" data-i18n="month_unit">월</span>
                        <select id="birth-day"></select>
                        <span class="unit-span" data-i18n="day_unit">일</span>
                    </div>
                </div>

                <!-- 성별 선택 그룹 -->
                <div class="input-form-group">
                    <label data-i18n="gender_select_label">성별:</label>
                    <div class="gender-buttons">
                        <input type="radio" id="gender-male" name="gender" value="male" checked>
                        <label for="gender-male" data-i18n="gender_male_label">남성</label>
                        <input type="radio" id="gender-female" name="gender" value="female">
                        <label for="gender-female" data-i18n="gender_female_label">여성</label>
                    </div>
                </div>

                <button type="button" id="get-saju-button" class="go-test-button" data-i18n="get_saju_reading">운세 확인하기</button>
            </div>

            <div id="loading-indicator" class="loading-indicator" style="display:none;">
                <div class="spinner"></div>
                <p data-i18n="ai_reading_fortune">AI가 분석 중입니다...</p>
            </div>

            <div id="result-container" class="result-section" style="display:none;">
                <h2 data-i18n="saju_result_h2">오늘의 운세 풀이</h2>
                <div id="saju-reading-text"></div>
                <button type="button" id="retake-button" class="go-test-button" data-i18n="retake_test">다시 테스트</button>
            </div>
        </section>
    </main>
    <script src="./fortune.js" type="module"></script>
</body>
</html>
