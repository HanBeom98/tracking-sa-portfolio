<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="lucky_recommendation_title">오늘의 행운 추천 - Tracking SA</title>
    <!-- CSS and JS will be injected by main.py -->
</head>
<body>
    <main class="recommendation-page">
        <section class="hero-banner">
            <h1 data-i18n="lucky_hero_title">오늘 당신의 행운은 무엇일까요?</h1>
            <p data-i18n="lucky_hero_subtitle">당신에게 필요한 컬러와 아이템을 추천해 드립니다.</p>
        </section>

        <section class="content-container">
            <div class="saju-input-section" style="margin-bottom: 3rem;">
                <div class="input-form-group">
                    <label for="user-name" data-i18n="name_label">이름:</label>
                    <input type="text" id="user-name" placeholder="이름을 입력하세요">
                </div>

                <div class="input-form-group">
                    <label data-i18n="birthdate_label">생일:</label>
                    <div class="birthdate-selectors">
                        <select id="birth-month"></select>
                        <span class="unit-span" data-i18n="month_unit"></span>
                        <select id="birth-day"></select>
                        <span class="unit-span" data-i18n="day_unit"></span>
                    </div>
                </div>

                <div class="input-form-group">
                    <label data-i18n="gender_select_label">성별:</label>
                    <div class="gender-buttons">
                        <input type="radio" id="gender-male" name="gender" value="male" checked>
                        <label for="gender-male" data-i18n="gender_male_label">남성</label>
                        <input type="radio" id="gender-female" name="gender" value="female">
                        <label for="gender-female" data-i18n="gender_female_label">여성</label>
                    </div>
                </div>

                <div class="action-area" style="margin-top: 20px;">
                    <button class="go-test-button" id="refresh-button" data-i18n="refresh_lucky">행운 추천받기</button>
                </div>
            </div>

            <!-- Web Component Integration -->
            <lucky-recommendation role="region" aria-live="polite" id="lucky-display"></lucky-recommendation>
        </section>
    </main>

    <script type="module" src="./script.js"></script>
    <script>
        // 간단한 새로고침 로직
        document.getElementById('refresh-button').addEventListener('click', () => {
            const el = document.querySelector('lucky-recommendation');
            if (el && typeof el.generateLuckyData === 'function') {
                el.generateLuckyData();
            }
        });
    </script>
</body>
</html>
