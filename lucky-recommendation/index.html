<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="lucky_recommendation_title">오늘의 행운 추천 - Tracking SA</title>
    <!-- CSS and JS will be injected by main.py -->
</head>
<body>
    <main class="recommendation-page">
        <section class="hero-banner">
            <h1 data-i18n="lucky_hero_title">오늘 당신의 행운은 무엇일까요?</h1>
            <p data-i18n="lucky_hero_subtitle">당신에게 필요한 컬러와 아이템을 추천해 드립니다.</p>
        </section>

        <section class="content-container">
            <!-- Web Component Integration -->
            <lucky-recommendation role="region" aria-live="polite" id="lucky-display"></lucky-recommendation>
            
            <div class="action-area">
                <button class="action-button" id="refresh-button" data-i18n="refresh_lucky">다시 확인하기</button>
            </div>
        </section>
    </main>

    <script type="module" src="./script.js"></script>
    <script>
        // 간단한 새로고침 로직
        document.getElementById('refresh-button').addEventListener('click', () => {
            const el = document.querySelector('lucky-recommendation');
            if (el && typeof el.generateLuckyData === 'function') {
                el.generateLuckyData();
            }
        });
    </script>
</body>
</html>
