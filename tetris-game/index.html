<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="tetris_game">테트리스 게임 - Tracking SA</title>
    <meta name="google-site-verification" content="UutJ4-ti1UsLczEuiR85D-gDNWjA16nl3whr0TBqR4k" />
    
    <style>
        :root {
            --primary-neon: oklch(65% 0.25 250);
            --bg-dark: oklch(10% 0.02 250);
            --text-light: oklch(95% 0.01 250);
        }
        /* 스크롤 방지를 위해 body 고정 */
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-light); 
            margin: 0; 
            overflow: hidden; /* 전체 페이지 스크롤 차단 */
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; /* 여백 최소화 */
        }
        #hero { text-align: center; margin-bottom: 10px; }
        #hero h1 { 
            font-size: 1.5rem; /* 제목 크기 축소 */
            margin: 0;
            background: linear-gradient(to right, var(--primary-neon), oklch(75% 0.2 180)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        tetris-game { 
            display: block; 
            box-shadow: 0 0 40px oklch(0% 0 0 / 0.5); 
            border-radius: 20px; 
        }
        /* 푸터 크기 줄임 */
        footer { padding: 5px !important; font-size: 0.8rem; }
    </style>
</head>
<body>
    <main>
        <section id="hero">
            <h1 data-i18n="tetris_game">테트리스 게임</h1>
        </section>
        <section id="tetris-section">
            <tetris-game></tetris-game>
        </section>
    </main>
    <script src="./script.js"></script>
</body>
</html>
