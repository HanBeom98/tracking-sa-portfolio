<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title data-i18n="tetris_game">테트리스 - Tracking SA</title>
    <meta name="google-site-verification" content="UutJ4-ti1UsLczEuiR85D-gDNWjA16nl3whr0TBqR4k" />
    <!-- [Revenue] AdSense -->
    <link rel="stylesheet" href="./style.css">
    <script src="./translations.js"></script>
    <script src="./script.js" defer></script>
    <style>
        :root {
            --bg-dark: oklch(10% 0.02 250);
        }
        /* [자동 최적화 핵심] */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh; /* Dynamic Viewport Height: 주소창 제외 실제 가용 높이 */
            overflow: hidden; /* 브라우저 스크롤 완전 차단 */
            background-color: var(--bg-dark);
        }
        /* 메인 영역이 헤더/푸터를 제외한 남은 공간을 flex로 꽉 채움 */
        main {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }
        /* 테트리스 컴포넌트 자체가 남은 공간을 자동으로 계산하도록 함 */
        tetris-game {
            flex: 1;
            min-height: 0; /* 중요: flex 컨테이너 안에서 축소 가능하게 함 */
        }
    </style>
</head>
<body>
    <main>
        <info-panel></info-panel>
        <tetris-game></tetris-game>
        <game-joystick></game-joystick>
    </main>
    <script src="./common.js"></script>
</body>
</html>
