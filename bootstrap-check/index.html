<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Manual Check</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background-color: oklch(95% 0.0 0.0); /* Light background */
      color: oklch(20% 0.0 0.0); /* Dark text */
    }

    body.dark-mode {
      background-color: oklch(15% 0.0 0.0); /* Dark background */
      color: oklch(95% 0.0 0.0); /* Light text */
    }

    bootstrap-manual-check {
      display: block;
      margin: 20px;
    }
  </style>
</head>
<body id="body">
  <bootstrap-manual-check language="en"></bootstrap-manual-check>

  <script src="./bootstrap-check/bootstrap-manual-check.js"></script>
  <script>
      // Initialize dark mode based on user preference or system settings
      const prefersDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const body = document.getElementById('body');
      if (prefersDarkMode) {
          body.classList.add('dark-mode');
      }
  </script>
</body>
</html>
