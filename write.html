<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="write_post_title">글쓰기 - TrackingSA</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TGD3WRNKPZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-TGD3WRNKPZ');
    </script>
    <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);

<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="write-form-section section-card">
            <h1 data-i18n="write_post_h1">자유게시판 글쓰기</h1>
            <form id="write-form" class="inquiry-form">
                <div class="form-field full-width">
                    <label for="title" data-i18n="title">제목</label>
                    <input type="text" id="title" data-i18n-placeholder="enter_title" placeholder="제목을 입력하세요" required>
                </div>
                <div class="form-field full-width">
                    <label for="content" data-i18n="content">내용</label>
                    <textarea id="content" rows="15" data-i18n-placeholder="enter_content" placeholder="내용을 입력하세요" required></textarea>
                </div>
                <div class="form-field">
                    <label for="password" data-i18n="password">비밀번호</label>
                    <input type="password" id="password" data-i18n-placeholder="password_for_edit_delete" placeholder="수정/삭제 시 사용할 비밀번호" required>
                </div>
                <div class="form-field">
                    <label for="password-confirm" data-i18n="confirm_password">비밀번호 확인</label>
                    <input type="password" id="password-confirm" data-i18n-placeholder="re_enter_password" placeholder="비밀번호를 다시 한번 입력하세요" required>
                </div>
                <button type="submit" id="submit-button" class="go-test-button" data-i18n="register">등록하기</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TrackingSA. 모든 권리 보유.</p>
    </footer>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- crypto-js for password hashing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <!-- Firebase-config -->
    <script src="firebase-config.js"></script>
    
    <script src="translations.js"></script>
    <script src="common.js"></script>
    <!-- 글쓰기 로직을 위한 별도의 스크립트 -->
    <script src="write.js"></script>
</body>
</html>
